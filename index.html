<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Automated Desk Study</title>

  <!-- SheetJS — must load BEFORE ArcGIS/Dojo to avoid AMD conflict -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- ArcGIS Maps SDK 4.29 -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    /* ── Tokens ──────────────────────────────────────────────────── */
    :root {
      --green-dark:   #1a3d2b;
      --green-mid:    #2d6a4f;
      --green-bright: #52b788;
      --green-light:  #d8f3dc;
      --green-pale:   #f0faf3;
      --amber:        #e9c46a;
      --amber-dark:   #8a6200;
      --red:          #c1121f;
      --red-light:    #fff0f0;
      --ink:          #111d13;
      --ink-mid:      #3a4a3e;
      --ink-faint:    #6b7c6f;
      --line:         #c9dece;
      --surface:      #ffffff;
      --bg:           #f4f9f5;
      --radius:       6px;
      --radius-lg:    10px;
      --shadow:       0 2px 8px rgba(29,63,40,.10);
      --shadow-lg:    0 6px 24px rgba(29,63,40,.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--green-dark);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      z-index: 10;
    }
    header svg { flex-shrink: 0; }
    header h1 {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: .03em;
    }
    header h1 strong { font-weight: bold; font-size: 16px; }
    header p { font-size: 11px; color: var(--green-bright); margin-top: 1px; letter-spacing: .02em; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panel ──────────────────────────────────────────────────── */
    .panel {
      width: 340px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-inner {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    .panel-inner::-webkit-scrollbar { width: 5px; }
    .panel-inner::-webkit-scrollbar-track { background: transparent; }
    .panel-inner::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    /* ── Map ────────────────────────────────────────────────────── */
    #viewDiv {
      flex: 1;
      position: relative;
    }

    /* ── Section label ──────────────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 8px;
      margin-top: 18px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Config note ────────────────────────────────────────────── */
    .config-note {
      background: #fffbea;
      border: 1px solid #f0d060;
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 11px;
      color: #6b5200;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .config-note strong { font-weight: bold; }

    /* ── Buffer control ─────────────────────────────────────────── */
    .buffer-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 4px;
    }
    .buffer-row label {
      font-size: 11px;
      color: var(--ink-faint);
      width: 80px;
      flex-shrink: 0;
    }
    .buffer-row input[type=number] {
      width: 58px;
      padding: 4px 6px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 12px;
      font-family: 'Georgia', serif;
      color: var(--ink);
      background: var(--surface);
    }
    .buffer-row input[type=number]:focus {
      outline: none;
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(45,106,79,.15);
    }
    .buffer-row span { font-size: 12px; color: var(--ink-mid); }
    .buffer-row .cat-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: bold;
      flex: 1;
    }
    .badge-intl-sm  { background: #e8f4ed; color: var(--green-dark); }
    .badge-natl-sm  { background: #e8f0fb; color: #1a3a6b; }
    .badge-local-sm { background: #fef9e7; color: #7a5200; }
    .badge-rec-sm   { background: #f5f0fb; color: #4a2080; }

    /* ── Buffer group ────────────────────────────────────────────── */
    .buf-group { margin-bottom: 5px; border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    .buf-group-header {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; cursor: pointer; user-select: none;
      background: var(--bg);
    }
    .buf-group-header:hover { background: var(--green-pale); }
    .buf-chevron { font-size: 9px; color: var(--ink-faint); transition: transform .15s; flex-shrink: 0; }
    .buf-chevron.open { transform: rotate(90deg); }
    .buf-badge {
      font-size: 10px; padding: 1px 7px; border-radius: 3px;
      font-weight: bold; flex: 1;
    }
    .buf-input {
      width: 46px; padding: 2px 5px; border: 1px solid var(--line);
      border-radius: 3px; font-size: 12px; font-family: 'Georgia', serif;
      color: var(--ink); background: var(--surface); text-align: right;
    }
    .buf-input:focus { outline: none; border-color: var(--green-mid); }
    .buf-km { font-size: 11px; color: var(--ink-faint); flex-shrink: 0; }

    /* layer chips container */
    .buf-layers {
      display: none; padding: 4px 6px 6px;
      background: var(--surface);
      min-height: 28px;
      border-top: 1px solid var(--line);
    }
    .buf-layers.open { display: block; }
    .buf-layers.drag-over { background: var(--green-pale); }

    /* individual draggable chip */
    .layer-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 7px 2px 5px;
      margin: 2px 2px;
      border: 1px solid var(--line);
      border-radius: 20px;
      font-size: 10px; color: var(--ink-mid);
      background: var(--bg);
      cursor: grab; user-select: none;
      transition: background .1s, border-color .1s;
    }
    .layer-chip:hover { border-color: var(--green-mid); color: var(--green-dark); background: var(--green-pale); }
    .layer-chip.dragging { opacity: .4; cursor: grabbing; }
    .layer-chip .chip-drag { font-size: 9px; color: var(--ink-faint); }
    .preset-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .preset-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--bg);
      color: var(--ink-mid);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      font-family: 'Georgia', serif;
    }
    .preset-btn:hover { border-color: var(--green-mid); color: var(--green-dark); }
    .preset-btn.active {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: #fff;
    }

    /* ── Buttons ────────────────────────────────────────────────── */
    .step-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Georgia', serif;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      border: 1px solid transparent;
    }
    .step-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-select {
      background: var(--surface);
      border-color: var(--line);
      color: var(--ink);
    }
    .btn-select .step-num { background: var(--green-light); color: var(--green-dark); }
    .btn-select:hover:not(:disabled) { border-color: var(--green-mid); }
    .btn-select.selecting {
      background: var(--green-light);
      border-color: var(--green-mid);
      color: var(--green-dark);
      animation: pulse-border 1.4s ease-in-out infinite;
    }
    .btn-select.selected {
      border-color: var(--green-bright);
      background: var(--green-pale);
    }
    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 0 0 rgba(82,183,136,.3); }
      50%      { box-shadow: 0 0 0 5px rgba(82,183,136,0); }
    }
    .btn-run {
      background: var(--green-mid);
      color: #fff;
      border-color: var(--green-mid);
      font-weight: bold;
    }
    .btn-run .step-num { background: rgba(255,255,255,.25); color: #fff; }
    .btn-run:hover:not(:disabled) { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-run:disabled {
      background: #b0c8b8;
      border-color: #b0c8b8;
      cursor: not-allowed;
      color: rgba(255,255,255,.7);
    }

    /* ── Status ─────────────────────────────────────────────────── */
    .status-bar {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: var(--radius);
      margin-bottom: 8px;
      display: none;
    }
    .status-bar.info  { background: var(--green-pale); color: var(--green-mid); border: 1px solid var(--line); display: block; }
    .status-bar.error { background: var(--red-light); color: var(--red); border: 1px solid #f5c0c0; display: block; }
    .status-bar.running { background: #f0f7ff; color: #1a5da0; border: 1px solid #b8d4f0; display: block; }

    /* ── Progress ───────────────────────────────────────────────── */
    .progress-wrap { display: none; margin-bottom: 10px; }
    .progress-wrap.active { display: block; }
    .progress-track {
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--green-bright);
      border-radius: 2px;
      transition: width .3s ease;
      width: 0%;
    }
    .progress-label { font-size: 10px; color: var(--ink-faint); margin-top: 4px; }

    /* ── Layer checklist ────────────────────────────────────────── */
    .layer-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: var(--radius);
      font-size: 11px;
      color: var(--ink-mid);
      border: 1px solid transparent;
    }
    .layer-item.found   { background: var(--green-pale); border-color: var(--line); color: var(--green-dark); }
    .layer-item.absent  { background: #fafafa; border-color: #ebebeb; color: var(--ink-faint); }
    .layer-item.missing { background: #fff8ee; border-color: #f5dfa0; color: #7a5200; }
    .layer-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .layer-item.found   .layer-dot { background: var(--green-bright); }
    .layer-item.absent  .layer-dot { background: #ccc; }
    .layer-item.missing .layer-dot { background: var(--amber); }
    .layer-count {
      margin-left: auto;
      font-weight: bold;
      font-size: 11px;
    }

    /* ── Report ─────────────────────────────────────────────────── */
    .report-box {
      display: none;
      border: 1px solid var(--green-bright);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: 12px;
    }
    .report-box.visible { display: block; }
    .report-header {
      background: var(--green-dark);
      color: #fff;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .report-header span { font-size: 11px; letter-spacing: .05em; text-transform: uppercase; }
    .report-actions { display: flex; gap: 6px; }
    .report-action-btn {
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,.3);
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: background .15s;
    }
    .report-action-btn:hover { background: rgba(255,255,255,.15); }
    .report-action-btn.copied { background: var(--green-bright); border-color: var(--green-bright); color: var(--green-dark); }
    .report-body {
      padding: 14px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--ink);
      background: var(--surface);
    }
    .report-body h2 {
      font-size: 13px;
      font-weight: bold;
      margin: 14px 0 4px;
      color: var(--ink);
    }
    .report-body h3 {
      font-size: 12px;
      font-weight: bold;
      margin: 10px 0 4px;
      color: var(--ink);
    }
    .report-body p {
      margin: 0 0 8px;
    }
    .report-body .para-num {
      font-weight: bold;
      margin-right: 6px;
    }
    .report-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin: 8px 0 14px;
    }
    .report-body th {
      background: var(--green-dark);
      color: #fff;
      padding: 5px 8px;
      text-align: left;
      font-weight: 500;
    }
    .report-body td {
      padding: 5px 8px;
      border: 1px solid var(--line);
      vertical-align: top;
    }
    .report-body tr:nth-child(even) td { background: var(--bg); }
    .report-body .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
    }
    .report-body .badge-intl  { background: #e8f4ed; color: var(--green-dark); }
    .report-body .badge-natl  { background: #e8f0fb; color: #1a3a6b; }
    .report-body .badge-local { background: #fef9e7; color: #7a5200; }
    .report-body .placeholder {
      background: #fffbea;
      border: 1px dashed #e0c060;
      border-radius: 3px;
      padding: 3px 6px;
      font-style: italic;
      color: #8a6200;
      font-size: 11px;
    }
    .report-body .citation-link {
      font-size: 10px;
      color: var(--green-mid);
      text-decoration: none;
    }
    .report-body .citation-link:hover { text-decoration: underline; }
    .report-body ul {
      margin: 4px 0 8px 16px;
      padding: 0;
    }
    .report-body ul li { margin-bottom: 2px; }

    /* ── Reset ──────────────────────────────────────────────────── */
    .reset-btn {
      width: 100%;
      padding: 7px;
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink-faint);
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: all .15s;
      margin-top: 6px;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Layer panel toggle button ──────────────────────────────── */
    #layerToggleBtn {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 12px;
      font-family: 'Georgia', serif;
      color: var(--ink-mid);
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .15s;
    }
    #layerToggleBtn:hover { border-color: var(--green-mid); color: var(--green-dark); }
    #layerToggleBtn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

    /* ── Layer panel drawer ─────────────────────────────────────── */
    #layerPanel {
      position: absolute;
      top: 0; right: 0;
      width: 260px;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--line);
      box-shadow: -4px 0 16px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      z-index: 9;
      transform: translateX(100%);
      transition: transform .22s ease;
    }
    #layerPanel.open { transform: translateX(0); }
    .lp-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .lp-close { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 16px; line-height: 1; padding: 0 2px; }
    .lp-close:hover { color: var(--ink); }
    .lp-body { overflow-y: auto; flex: 1; padding: 8px 0; }
    .lp-body::-webkit-scrollbar { width: 4px; }
    .lp-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
    .lp-group-row { display: flex; align-items: center; gap: 6px; padding: 5px 14px; cursor: pointer; user-select: none; }
    .lp-group-row:hover { background: var(--bg); }
    .lp-chevron { font-size: 9px; color: var(--ink-faint); transition: transform .15s; flex-shrink: 0; width: 10px; }
    .lp-chevron.open { transform: rotate(90deg); }
    .lp-group-check { width: 13px; height: 13px; accent-color: var(--green-mid); flex-shrink: 0; cursor: pointer; }
    .lp-group-label { font-size: 12px; font-weight: bold; color: var(--ink); flex: 1; }
    .lp-children { display: none; }
    .lp-children.open { display: block; }
    .lp-layer-row { display: flex; align-items: center; gap: 6px; padding: 4px 14px 4px 32px; cursor: pointer; }
    .lp-layer-row:hover { background: var(--bg); }
    .lp-layer-check { width: 13px; height: 13px; accent-color: var(--green-mid); flex-shrink: 0; cursor: pointer; }
    .lp-layer-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.12); }
    .lp-layer-label { font-size: 11px; color: var(--ink-mid); flex: 1; line-height: 1.3; }
    .lp-layer-row.wms .lp-layer-label { font-style: italic; color: var(--ink-faint); }

    /* ── Search bar ─────────────────────────────────────────────── */
    #searchBar {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: visible;
      width: 320px;
    }
    #searchInput {
      flex: 1;
      padding: 6px 10px;
      border: none;
      outline: none;
      font-size: 12px;
      font-family: 'Georgia', serif;
      color: var(--ink);
      background: transparent;
      min-width: 0;
    }
    #searchBtn {
      padding: 6px 10px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      transition: background .15s;
    }
    #searchBtn:hover { background: var(--green-mid); }
    #searchResults {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
      max-height: 220px;
      overflow-y: auto;
    }
    #searchResults.active { display: block; }
    .search-result-item {
      padding: 7px 10px;
      font-size: 11px;
      color: var(--ink-mid);
      cursor: pointer;
      border-bottom: 1px solid var(--line);
      line-height: 1.4;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg); color: var(--green-dark); }
    .search-result-item .result-type { font-size: 10px; color: var(--ink-faint); margin-left: 4px; }

    /* ── Map selecting overlay ──────────────────────────────────── */
    #selectOverlay {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: var(--green-dark);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Georgia', serif;
      pointer-events: none;
      display: none;
      z-index: 5;
      box-shadow: var(--shadow-lg);
      white-space: nowrap;
    }
    #selectOverlay.active { display: block; animation: fadeDown .2s ease; }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="13" stroke="#52b788" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="7" stroke="#52b788" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="14" cy="14" r="3" fill="#52b788"/>
    <line x1="14" y1="1" x2="14" y2="5" stroke="#52b788" stroke-width="1.5"/>
    <line x1="14" y1="23" x2="14" y2="27" stroke="#52b788" stroke-width="1.5"/>
    <line x1="1" y1="14" x2="5" y2="14" stroke="#52b788" stroke-width="1.5"/>
    <line x1="23" y1="14" x2="27" y2="14" stroke="#52b788" stroke-width="1.5"/>
  </svg>
  <div>
    <h1><strong>Clarkson & Woods Automated Desk Study</strong></h1>

        <rect x="8" y="1" width="5" height="5" rx="1"/>
        <rect x="1" y="8" width="5" height="5" rx="1"/>

      </svg>
      Layers
    </button>

    <!-- Layer panel drawer -->
    <div id="layerPanel">
      <div class="lp-header">
        <span>Map Layers</span>
        <button class="lp-close" onclick="toggleLayerPanel()">&#x2715;</button>
      </div>
      <div class="lp-body" id="layerPanelBody">
        <div style="padding:14px;font-size:11px;color:var(--ink-faint)">Loading layers…</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Script ────────────────────────────────────────────────────────────── -->
<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/WebMap",
  "esri/geometry/geometryEngineAsync",
  "esri/Graphic",
  "esri/rest/query",
  "esri/rest/support/Query",
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
], function(
  Map, MapView, WebMap,
  geometryEngineAsync,
  Graphic, queryREST, Query,
  OAuthInfo, IdentityManager
) {

  // ══════════════════════════════════════════════════════════════════════════
  // ██  CONFIG
  // ══════════════════════════════════════════════════════════════════════════
  const CONFIG = {

    portalUrl: "https://www.arcgis.com",
    webMapId:  "51a20531f9f44c4682f1bb246981ea86",
    appId: "pduqao2ad2vWm62Z",

    // Matches the red line boundary layer by title
    redLineTitlePattern: /red.?line.?boundar/i,

    // ── Layers ──────────────────────────────────────────────────────────────
    // title        — exact layer title as it appears in the web map
    // shortName    — used in the report paragraph
    // nameField    — attribute field holding the designation/feature name
    //                set to null for layers where just the count is reported
    // type         — "statutory" | "habitat" | "river" | "bat" | "records"
    // groupByField — true: list unique nameField values (e.g. habitat types)
    // maxList      — max names to spell out before "and N others"
    layers: [

      // ── England: statutory designations ──────────────────────────────────
      { title: "Sites of Special Scientific Interest (England)",
        shortName: "Sites of Special Scientific Interest (SSSIs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Special Areas of Conservation (England)",
        shortName: "Special Areas of Conservation (SACs)",
        nameField: "SAC_NAME", type: "statutory", maxList: 4 },

      { title: "Special Protection Areas (England)",
        shortName: "Special Protection Areas (SPAs)",
        nameField: "SPA_NAME", type: "statutory", maxList: 4 },

      { title: "Ramsar (England)",
        shortName: "Ramsar wetland sites",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "National Nature Reserves (England)",
        shortName: "National Nature Reserves (NNRs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Local Nature Reserves (England)",
        shortName: "Local Nature Reserves (LNRs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Areas of Outstanding Natural Beauty (England)",
        shortName: "Areas of Outstanding Natural Beauty (AONBs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "National Parks (England)",
        shortName: "National Parks",
        nameField: "NAME", type: "statutory", maxList: 4 },

      // ── Wales: statutory designations (WMS — display only, cannot query) ──
      { title: "SSSI",
        shortName: "Sites of Special Scientific Interest (SSSIs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "SAC",
        shortName: "Special Areas of Conservation (SACs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "SPA",
        shortName: "Special Protection Areas (SPAs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "RAMSAR",
        shortName: "Ramsar wetland sites (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "NNR",
        shortName: "National Nature Reserves (NNRs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "LNR",
        shortName: "Local Nature Reserves (LNRs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "AONB",
        shortName: "Areas of Outstanding Natural Beauty (AONBs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "National Park",
        shortName: "National Parks (Wales)",
        nameField: null, type: "statutory", wms: true },

      // ── England: habitats ─────────────────────────────────────────────────
      { title: "Ancient Woodland (England)",
        shortName: "ancient woodland",
        nameField: "NAME", statusField: "THEMNAME", type: "habitat", maxList: 4 },

      { title: "Priority Habitats Inventory (England)",
        shortName: "Priority Habitat Inventory parcels",
        nameField: "MainHabs", type: "habitat",
        groupByField: true, maxList: 6 },

      // ── Wales: habitats (WMS — display only, cannot query) ───────────────
      { title: "Ancient Woodland",
        shortName: "ancient woodland (Wales)",
        nameField: null, type: "habitat", wms: true },

      { title: "Priority Habitats - High sensitivity (Wales)",
        shortName: "Priority Habitats of high sensitivity (Wales)",
        nameField: null, type: "habitat", wms: true },

      // ── River habitats ────────────────────────────────────────────────────
      { title: "Priority River Habitat - Rivers (England)",
        shortName: "Priority River Habitat — Rivers",
        nameField: null, type: "river" },

      { title: "Priority River Habitat - Headwater Areas (England)",
        shortName: "Priority River Habitat — Headwater Areas",
        nameField: null, type: "river" },

      { title: "Chalk Rivers (England)",
        shortName: "Chalk Rivers",
        nameField: null, type: "river" },

      { title: "EA Statutory Rivers",
        shortName: "EA Statutory Rivers",
        nameField: null, type: "river", lengthField: "LENGTH_KM" },

      // ── Bat consultation zones (individual layers within group) ───────────
      { title: "Wiltshire",
        shortName: "Bat Consultation Zone — Wiltshire",
        nameField: null, bandField: "Consutatio_Band", type: "bat" },

      { title: "Trowbirdge SPD",
        shortName: "Bat Consultation Zone — Trowbridge SPD",
        nameField: null, bandField: "Consutatio_Band", type: "bat" },

      { title: "North Somerset and Mendips",
        shortName: "Bat Consultation Zone — North Somerset and Mendips",
        nameField: null, bandField: "Consutatio_Band", type: "bat" },

      { title: "Hestercombe House",
        shortName: "Bat Consultation Zone — Hestercombe House",
        nameField: null, bandField: "Consutatio_Band", type: "bat" },

      { title: "Exmoor and Quantocks",
        shortName: "Bat Consultation Zone — Exmoor and Quantocks",
        nameField: null, bandField: "Consutatio_Band", type: "bat" },

      { title: "Mells Valley",
        shortName: "Bat Consultation Zone — Mells Valley",
        nameField: null, bandField: "Consutatio_Band", type: "bat" },

      // ── Biodiversity records ──────────────────────────────────────────────
      { title: "iNaturalist Observations",
        shortName: "iNaturalist biodiversity observations",
        nameField: "common_name", type: "records", maxList: 5 },

      { title: "C&W In-house Records",
        shortName: "C&W in-house biodiversity records",
        nameField: "Common_Name", type: "records", maxList: 5 },
    ],
  };
  // ══════════════════════════════════════════════════════════════════════════

  // ── Auth ─────────────────────────────────────────────────────────────────
  if (CONFIG.appId) {
    const info = new OAuthInfo({
      appId: CONFIG.appId,
      portalUrl: CONFIG.portalUrl,
      popup: false,
    });
    IdentityManager.registerOAuthInfos([info]);

    // Check sign-in state; redirect to login if not authenticated
    IdentityManager.checkSignInStatus(CONFIG.portalUrl + "/sharing")
      .catch(() => IdentityManager.getCredential(CONFIG.portalUrl + "/sharing"));
  }

  // ── Map & View ────────────────────────────────────────────────────────────
  const webMap = new WebMap({ portalItem: { id: CONFIG.webMapId, portal: { url: CONFIG.portalUrl } } });
  const view = new MapView({
    container: "viewDiv",
    map: webMap,
    ui: { components: ["zoom", "compass", "attribution"] },
    popup: { autoOpenEnabled: false },  // suppress all popups
  });

  // Once the map loads, build the layer panel and load Word export library
  // Note: we do NOT force layer visibility — the map's default state is preserved.
  // Layers are queried via their REST endpoints regardless of visibility.
  // ── JNCC protected species lookup ────────────────────────────────────────
  // Loaded once on startup; maps lowercase name → {designations, category, taxonGroup}
  let jnccLookup = null;   // null = not loaded yet; {} = loaded (may be empty on error)
  let jnccLoading = false;

  const JNCC_URL = "https://data.jncc.gov.uk/data/478f7160-967b-4366-acdf-8941fd33850b/Taxon-designations-20231206.xlsx";

  // Reporting categories we want to flag
  const PROTECTED_CATEGORIES = [
    "Wildlife and Countryside Act 1981",
    "NERC Act S41 (England)",
    "NERC Act S42 (Wales)",
    "Habitats and Species Regulations 2017",
    "Protection of Badgers Act 1992",
    "Birds Directive",
    "Habitats Directive",
  ];
  // Designation values to exclude from Red List entries (not actually threatened)
  const REDLIST_EXCLUDE = ["lc","lc_","not evaluated","ne","not assessed","na","dd"];

  async function loadJncc() {
    if (jnccLookup !== null || jnccLoading) return;
    jnccLoading = true;
    try {
      const resp = await fetch(JNCC_URL);
      const buf  = await resp.arrayBuffer();
      const wb   = XLSX.read(buf, { type: "array" });

      // Find the Master List sheet
      const sheetName = wb.SheetNames.find(n => /master/i.test(n)) || wb.SheetNames[0];
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "" });

      const lookup = {};

      rows.forEach(row => {
        const repCat   = String(row["Reporting category"] || row["reporting category"] || "").trim();
        const desig    = String(row["Designation"] || row["designation"] || "").trim().toLowerCase();
        const taxName  = String(row["Recommended taxon name"] || "").trim().toLowerCase();
        const comName  = String(row["Common name"] || "").trim().toLowerCase();
        const category = String(row["Category"] || row["category"] || "").trim();
        const taxGroup = String(row["Taxon group"] || row["taxon group"] || "").trim();

        // Check if this row matches a protected category
        const isProtected = PROTECTED_CATEGORIES.some(c => repCat.includes(c));

        // Check if this is a Red List entry that isn't LC/NE/NA
        const isRedList = /red list/i.test(repCat) && !REDLIST_EXCLUDE.some(x => desig.startsWith(x));

        if (!isProtected && !isRedList) return;

        const designLabel = isRedList
          ? `Red List (${row["Designation"] || ""})`.trim()
          : repCat.replace("Habitats and Species Regulations 2017", "Hab. Regs.")
                  .replace("Wildlife and Countryside Act 1981", "WCA")
                  .replace("Protection of Badgers Act 1992", "Badgers Act")
                  .replace("NERC Act S41 (England)", "NERC S41")
                  .replace("NERC Act S42 (Wales)", "NERC S42")
                  .replace("Habitats Directive", "Hab. Dir.")
                  .replace("Birds Directive", "Birds Dir.");

        // Add to lookup under both scientific and common name
        [taxName, comName].filter(Boolean).forEach(key => {
          if (!lookup[key]) lookup[key] = { category, taxonGroup: taxGroup, designations: new Set() };
          lookup[key].designations.add(designLabel);
        });
      });

      // Convert Sets to sorted arrays
      Object.values(lookup).forEach(v => { v.designations = [...v.designations].sort(); });
      jnccLookup = lookup;
      console.log(`JNCC lookup loaded: ${Object.keys(lookup).length} protected taxa`);
    } catch(e) {
      console.warn("JNCC lookup failed to load:", e.message);
      jnccLookup = {};
    }
    jnccLoading = false;
  }

  function lookupSpecies(name) {
    if (!jnccLookup) return null;
    return jnccLookup[name.toLowerCase().trim()] || null;
  }

  view.when(() => {
    buildLayerPanel();
    buildBufferGroups();
    loadJncc(); // start loading JNCC data in background
  });

  // ── Layer panel ───────────────────────────────────────────────────────────
  window.toggleLayerPanel = function() {
    const panel = document.getElementById("layerPanel");
    const btn   = document.getElementById("layerToggleBtn");
    panel.classList.toggle("open");
    btn.classList.toggle("active");
  };

  function buildLayerPanel() {
    const body = document.getElementById("layerPanelBody");
    body.innerHTML = "";

    // Render layers in reverse so top layers appear first (matches map draw order)
    const allLayers = webMap.layers.toArray().slice().reverse();
    allLayers.forEach(layer => renderLayerRow(layer, body, 0));
  }

  function renderLayerRow(layer, container, depth) {
    const isGroup = layer.type === "group";
    const isWms   = layer.type === "wms" || layer.type === "wmts";

    if (isGroup) {
      // ── Group row ──────────────────────────────────────────────
      const groupDiv = document.createElement("div");

      const row = document.createElement("div");
      row.className = "lp-group-row";

      const chevron = document.createElement("span");
      chevron.className = "lp-chevron open";
      chevron.textContent = "▶";

      const check = document.createElement("input");
      check.type = "checkbox";
      check.className = "lp-group-check";
      check.checked = layer.visible;
      check.addEventListener("change", e => {
        e.stopPropagation();
        layer.visible = check.checked;
        // Sync child checkboxes
        children.querySelectorAll("input[type=checkbox]").forEach(cb => {
          cb.checked = check.checked;
        });
        // Sync child layer visibility
        if (layer.layers) layer.layers.forEach(l => l.visible = check.checked);
      });

      const label = document.createElement("span");
      label.className = "lp-group-label";
      label.textContent = layer.title;

      row.appendChild(chevron);
      row.appendChild(check);
      row.appendChild(label);

      const children = document.createElement("div");
      children.className = "lp-children open";

      // Toggle expand/collapse on row click (not checkbox)
      row.addEventListener("click", e => {
        if (e.target === check) return;
        children.classList.toggle("open");
        chevron.classList.toggle("open");
      });

      groupDiv.appendChild(row);
      groupDiv.appendChild(children);
      container.appendChild(groupDiv);

      // Render children in reverse order
      if (layer.layers) {
        const childArr = layer.layers.toArray().slice().reverse();
        childArr.forEach(child => renderLayerRow(child, children, depth + 1));
      }

    } else {
      // ── Leaf layer row ─────────────────────────────────────────
      const row = document.createElement("div");
      row.className = "lp-layer-row" + (isWms ? " wms" : "");
      row.style.paddingLeft = (14 + depth * 14) + "px";

      const check = document.createElement("input");
      check.type = "checkbox";
      check.className = "lp-layer-check";
      check.checked = layer.visible;
      check.addEventListener("change", () => { layer.visible = check.checked; });

      // Colour swatch — try to get renderer colour
      const swatch = document.createElement("span");
      swatch.className = "lp-layer-swatch";
      try {
        const sym = layer.renderer?.symbol || layer.renderer?.defaultSymbol;
        const col = sym?.color;
        if (col) swatch.style.background = `rgba(${col.r},${col.g},${col.b},${col.a ?? 1})`;
        else swatch.style.background = "#aaa";
      } catch(e) { swatch.style.background = "#aaa"; }

      const label = document.createElement("span");
      label.className = "lp-layer-label";
      label.textContent = layer.title + (isWms ? " (WMS)" : "");

      row.appendChild(check);
      row.appendChild(swatch);
      row.appendChild(label);

      // Clicking the row (not checkbox) also toggles
      row.addEventListener("click", e => {
        if (e.target === check) return;
        check.checked = !check.checked;
        layer.visible = check.checked;
      });

      container.appendChild(row);
    }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let clickHandler  = null;
  let selectedGeom  = null;
  let bufferGraphic = null;

  // ── Buffer group state ────────────────────────────────────────────────────
  // layerAssignments maps cfg.title → category key
  const layerAssignments = {};

  const BUFFER_GROUPS = [
    { key: "international", label: "International",  badgeClass: "badge-intl-sm",  inputId: "bufIntl",  defaultKm: 4 },
    { key: "national",      label: "National",       badgeClass: "badge-natl-sm",  inputId: "bufNatl",  defaultKm: 2 },
    { key: "local",         label: "Local",          badgeClass: "badge-local-sm", inputId: "bufLocal", defaultKm: 2 },
    { key: "records",       label: "Records",        badgeClass: "badge-rec-sm",   inputId: "bufRec",   defaultKm: 1 },
  ];

  function defaultCategory(cfg) {
    if (cfg.type === "records") return "records";
    if (cfg.type === "bat") return "national";
    if (cfg.type === "river" || cfg.type === "habitat") return "national";
    if (cfg.type === "statutory") {
      const imp = designationImportance(cfg.shortName);
      if (imp === "International") return "international";
      if (imp === "Local") return "local";
      return "national";
    }
    return "national";
  }

  function buildBufferGroups() {
    // Initialise assignments from defaults
    CONFIG.layers.forEach(cfg => {
      if (!cfg.wms) layerAssignments[cfg.title] = defaultCategory(cfg);
    });

    const container = document.getElementById("bufferGroups");
    container.innerHTML = "";

    BUFFER_GROUPS.forEach(grp => {
      const groupEl = document.createElement("div");
      groupEl.className = "buf-group";
      groupEl.dataset.key = grp.key;

      // Header row
      const header = document.createElement("div");
      header.className = "buf-group-header";
      header.innerHTML = `
        <span class="buf-chevron">▶</span>
        <span class="buf-badge ${grp.badgeClass}">${grp.label}</span>
        <input class="buf-input" id="${grp.inputId}" type="number"
          value="${grp.defaultKm}" min="0.1" max="20" step="0.5"/>
        <span class="buf-km">km</span>`;

      const chevron = header.querySelector(".buf-chevron");
      const layersDiv = document.createElement("div");
      layersDiv.className = "buf-layers";
      layersDiv.dataset.key = grp.key;

      // Toggle expand/collapse
      header.addEventListener("click", e => {
        if (e.target.classList.contains("buf-input")) return;
        layersDiv.classList.toggle("open");
        chevron.classList.toggle("open");
      });

      // Drag-over highlighting
      layersDiv.addEventListener("dragover", e => {
        e.preventDefault();
        layersDiv.classList.add("drag-over");
      });
      layersDiv.addEventListener("dragleave", () => layersDiv.classList.remove("drag-over"));
      layersDiv.addEventListener("drop", e => {
        e.preventDefault();
        layersDiv.classList.remove("drag-over");
        const title = e.dataTransfer.getData("text/plain");
        if (title && layerAssignments[title] !== grp.key) {
          layerAssignments[title] = grp.key;
          refreshChips();
        }
      });

      groupEl.appendChild(header);
      groupEl.appendChild(layersDiv);
      container.appendChild(groupEl);
    });

    refreshChips();
  }

  function refreshChips() {
    // Clear all chip containers
    document.querySelectorAll(".buf-layers").forEach(d => d.innerHTML = "");

    CONFIG.layers.forEach(cfg => {
      if (cfg.wms) return; // WMS layers not queryable — skip
      const cat = layerAssignments[cfg.title] || defaultCategory(cfg);
      const container = document.querySelector(`.buf-layers[data-key="${cat}"]`);
      if (!container) return;

      const chip = document.createElement("div");
      chip.className = "layer-chip";
      chip.draggable = true;
      chip.innerHTML = `<span class="chip-drag">⠿</span>${cfg.title.replace(/ \(England\)| \(Wales\)/g,"").trim()}`;
      chip.title = cfg.title;

      chip.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", cfg.title);
        chip.classList.add("dragging");
      });
      chip.addEventListener("dragend", () => chip.classList.remove("dragging"));

      container.appendChild(chip);
    });
  }

  // ── Buffer helpers ────────────────────────────────────────────────────────
  function getBuffers() {
    const vals = {};
    BUFFER_GROUPS.forEach(g => {
      vals[g.key] = parseFloat(document.getElementById(g.inputId)?.value) || g.defaultKm;
    });
    return vals;
  }

  // ── Selection ─────────────────────────────────────────────────────────────
  window.startSelection = function() {
    resetState(false);
    setStatus("selecting");
    document.getElementById("btnSelect").classList.add("selecting");
    document.getElementById("btnSelectLabel").textContent = "Click boundary on map…";
    document.getElementById("selectOverlay").classList.add("active");
    view.cursor = "crosshair";

    if (clickHandler) clickHandler.remove();
    clickHandler = view.on("click", async event => {
      // Suppress default popup
      event.stopPropagation();

      // Find red line layers recursively through groups
      const redLayers = [];
      function collectRedLayers(layers) {
        layers.forEach(l => {
          if (CONFIG.redLineTitlePattern.test(l.title)) redLayers.push(l);
          if (l.type === "group" && l.layers) collectRedLayers(l.layers);
        });
      }
      collectRedLayers(webMap.layers);

      const hitResult = await view.hitTest(event, { include: redLayers.length ? redLayers : undefined });
      const hit = hitResult.results.find(r => r.graphic && r.graphic.geometry);

      if (!hit) {
        setStatus("error", "No boundary feature found at that location. Try clicking directly on the red line.");
        endSelection();
        return;
      }

      selectedGeom = hit.graphic.geometry;
      endSelection();
      setStatus("info", "✓ Boundary selected — ready to run screening.");
      document.getElementById("btnSelect").classList.add("selected");
      document.getElementById("btnSelectLabel").textContent = "✓ Boundary selected";
      document.getElementById("btnRun").disabled = false;
    });
  };

  function endSelection() {
    if (clickHandler) { clickHandler.remove(); clickHandler = null; }
    document.getElementById("btnSelect").classList.remove("selecting");
    document.getElementById("selectOverlay").classList.remove("active");
    view.cursor = "default";
  }

  // ── Analysis ──────────────────────────────────────────────────────────────
  window.runAnalysis = async function() {
    if (!selectedGeom) return;

    const buffers = getBuffers();

    document.getElementById("btnRun").disabled = true;
    document.getElementById("btnRunLabel").textContent = "Running…";
    document.getElementById("layerResults").style.display = "none";
    document.getElementById("reportBox").classList.remove("visible");

    setStatus("running", "Building buffers and querying layers…");
    showProgress(5, "Building buffers…");

    // Build one buffer geometry per category
    const bufGeoms = {};
    for (const [cat, km] of Object.entries(buffers)) {
      const m = km * 1000;
      let g = await geometryEngineAsync.geodesicBuffer(selectedGeom, m, "meters");
      if (!g) g = await geometryEngineAsync.buffer(selectedGeom, m, "meters");
      bufGeoms[cat] = g;
    }

    // Draw the national buffer as the visual reference
    if (bufferGraphic) view.graphics.remove(bufferGraphic);
    bufferGraphic = new Graphic({
      geometry: bufGeoms.national,
      symbol: { type: "simple-fill", color: [0,110,60,0.06], outline: { color: [0,110,60,0.65], width: 1.5, style: "dash" } },
    });
    view.graphics.add(bufferGraphic);
    view.goTo({ target: bufGeoms.international, padding: { top: 40, bottom: 40, left: 40, right: 40 } });

    // ── Query all layers in parallel ─────────────────────────────────────────
    // Recursively find a layer by title through group layers
    function findLayer(layers, title) {
      for (let i = 0; i < layers.length; i++) {
        const l = layers.getItemAt(i);
        if (l.title === title) return l;
        if (l.type === "group" && l.layers) {
          const found = findLayer(l.layers, title);
          if (found) return found;
        }
      }
      return null;
    }

    const total = CONFIG.layers.length;
    let done = 0;
    const results = {};

    const promises = CONFIG.layers.map(async cfg => {
      // Pick the correct buffer geometry for this layer's category
      const cat = layerAssignments[cfg.title] || defaultCategory(cfg);
      const bufGeom = bufGeoms[cat];
      const layer = findLayer(webMap.layers, cfg.title);

      if (!layer) {
        results[cfg.title] = { status: "missing", cfg };
        update();
        return;
      }

      // WMS layers cannot be queried via REST — mark for manual check
      if (layer.type === "wms" || layer.type === "wmts" || layer.type === "wms-sublayer") {
        results[cfg.title] = { status: "missing", cfg, error: "WMS layer — cannot query directly" };
        update();
        return;
      }

      // Build service URL
      let url = layer.url;
      if (layer.layerId !== undefined && layer.layerId !== null) url += `/${layer.layerId}`;
      else if (layer.sublayers && layer.sublayers.length) url += `/0`;
      console.log(`Querying "${cfg.title}" → ${url}`);

      try {
        const PAGE = 500;

        if (cfg.type === "bat") {
          // Bat zones: query against the RLB itself (not the buffer)
          // to determine if the site boundary falls within the zone
          const batQ = new Query({
            geometry: selectedGeom,
            spatialRelationship: "intersects",
            outFields: cfg.bandField ? [cfg.bandField] : ["*"],
            returnGeometry: false,
            num: 10,
          });
          const batFs = await queryREST.executeQueryJSON(url, batQ);
          const batFeatures = batFs.features || [];
          // Collect unique band values
          const bands = [...new Set(
            batFeatures.map(f => cfg.bandField ? f.attributes[cfg.bandField] : null).filter(Boolean)
          )];
          results[cfg.title] = {
            status: batFeatures.length > 0 ? "found" : "absent",
            count: batFeatures.length,
            names: bands,
            features: batFeatures,
            bufKm: buffers[cat],
            cfg,
          };

        } else if (cfg.groupByField) {
          // PHI: fetch name + area fields, sum area per habitat type
          const nameQ = new Query({
            geometry: bufGeom, spatialRelationship: "intersects",
            outFields: [cfg.nameField, "Shape__Area", "AreaHa"],
            returnGeometry: false, num: 2000
          });
          const nameFs = await queryREST.executeQueryJSON(url, nameQ);
          const features = nameFs.features || [];
          console.log(`PHI query: ${features.length} features`);

          // Sum area per habitat type (Shape__Area is in map units m², convert to ha)
          const areaByType = {};
          features.forEach(f => {
            const type = f.attributes[cfg.nameField];
            if (!type) return;
            const rawArea = f.attributes["Shape__Area"] || f.attributes["AreaHa"];
            const ha = f.attributes["AreaHa"]
              ? parseFloat(f.attributes["AreaHa"])
              : parseFloat(rawArea) / 10000;
            areaByType[type] = (areaByType[type] || 0) + (isNaN(ha) ? 0 : ha);
          });

          // True count fallback
          let trueCount = features.length;
          try {
            const cr = await queryREST.executeQueryJSON(url,
              new Query({ geometry: bufGeom, spatialRelationship: "intersects", returnCountOnly: true, where: "1=1" }));
            if (cr.count > 0) trueCount = cr.count;
          } catch(e) {}

          results[cfg.title] = {
            status: trueCount > 0 ? "found" : (features.length > 0 ? "found" : "absent"),
            count: trueCount,
            names: Object.keys(areaByType),
            _areaByType: areaByType,
            _rawNames: features.map(f => f.attributes[cfg.nameField]).filter(Boolean),
            features: [],
            bufKm: buffers[cat],
            cfg,
          };

        } else {
          // Paginate to get all features (geometry + attributes), capped at 2000
          const allFeatures = [];
          let offset = 0;
          const MAX = 2000;

          while (offset < MAX) {
            const q = new Query({
              geometry: bufGeom,
              spatialRelationship: "intersects",
              outFields: ["*"],
              returnGeometry: true,
              num: PAGE,
              start: offset,
            });
            const fs = await queryREST.executeQueryJSON(url, q);
            const batch = fs.features || [];
            allFeatures.push(...batch);
            if (batch.length < PAGE) break;
            offset += PAGE;
          }

          let trueCount = allFeatures.length;
          if (allFeatures.length >= MAX) {
            try {
              const countQ = new Query({ geometry: bufGeom, spatialRelationship: "intersects", returnCountOnly: true, where: "1=1" });
              const cr = await queryREST.executeQueryJSON(url, countQ);
              trueCount = cr.count || allFeatures.length;
            } catch(e) {}
          }

          const rawNames = allFeatures.map(f => f.attributes[cfg.nameField]).filter(Boolean);
          const unique = [...new Set(rawNames)];

          results[cfg.title] = {
            status: allFeatures.length > 0 ? "found" : "absent",
            count: trueCount,
            names: unique,
            features: allFeatures,
            bufKm: buffers[cat],
            cfg,
          };
        }
      } catch(e) {
        results[cfg.title] = { status: "missing", cfg, error: e.message };
      }
      update();
    });

    function update() {
      done++;
      const pct = Math.round((done / total) * 100);
      const remaining = CONFIG.layers.filter(l => !results[l.title]);
      const nextName = remaining.length ? remaining[0].title.split("(")[0].trim() : "Finalising…";
      showProgress(pct, `Querying: ${nextName}`);
    }

    await Promise.all(promises);

    hideProgress();
    renderLayerList(results);
    setStatus("running", "Calculating distances and building report…");
    const report = await buildReport(results, buffers, selectedGeom);
    renderReport(report);
    setStatus("info", `✓ Screening complete — ${CONFIG.layers.filter(l => results[l.title]?.status === "found").length} layer(s) with intersecting features.`);
    resetRunButton();
    document.getElementById("btnReset").style.display = "block";
  };

  // ── Layer results list ────────────────────────────────────────────────────
  function renderLayerList(results) {
    const list = document.getElementById("layerList");
    list.innerHTML = "";

    CONFIG.layers.forEach(cfg => {
      const r = results[cfg.title];
      if (!r) return;
      const item = document.createElement("div");
      item.className = `layer-item ${r.status}`;

      const dot = document.createElement("span");
      dot.className = "layer-dot";

      const name = document.createElement("span");
      name.textContent = cfg.title.replace(/\(.*?\)/g, "").trim();

      item.appendChild(dot);
      item.appendChild(name);

      if (r.status === "found") {
        const count = document.createElement("span");
        count.className = "layer-count";
        count.textContent = r.count;
        item.appendChild(count);
      } else if (r.status === "missing") {
        const tag = document.createElement("span");
        tag.className = "layer-count";
        tag.style.color = "#8a6200";
        tag.textContent = "not found";
        item.appendChild(tag);
      }

      list.appendChild(item);
    });

    document.getElementById("layerResults").style.display = "block";
  }

  // ── Distance and direction helpers ────────────────────────────────────────
  async function nearestDistanceM(featureGeom, rlbGeom) {
    try { return await geometryEngineAsync.distance(rlbGeom, featureGeom, "meters"); }
    catch(e) { return null; }
  }

  function bearingToCardinal(bearing) {
    const dirs = ["north","north-east","east","south-east","south","south-west","west","north-west"];
    return dirs[Math.round(((bearing % 360) + 360) % 360 / 45) % 8];
  }

  function directionFromRlb(rlbGeom, featureGeom) {
    if (!rlbGeom?.extent || !featureGeom?.extent) return null;
    const rc = { x: (rlbGeom.extent.xmin + rlbGeom.extent.xmax) / 2, y: (rlbGeom.extent.ymin + rlbGeom.extent.ymax) / 2 };
    const fc = { x: (featureGeom.extent.xmin + featureGeom.extent.xmax) / 2, y: (featureGeom.extent.ymin + featureGeom.extent.ymax) / 2 };
    return bearingToCardinal(Math.atan2(fc.x - rc.x, fc.y - rc.y) * 180 / Math.PI);
  }

  function formatHa(attrs) {
    const raw = attrs["Shape__Area"] || attrs["AreaHa"] || attrs["AREA"] || attrs["MEASURE"];
    if (!raw) return null;
    // Shape__Area is in map units (metres²) — convert to ha; AreaHa already in ha
    const val = attrs["AreaHa"] ? parseFloat(raw) : parseFloat(raw) / 10000;
    return val.toFixed(2);
  }

  function designationImportance(shortName) {
    const s = shortName.toLowerCase();
    if (s.includes("sac") || s.includes("spa") || s.includes("ramsar") || s.includes("special area") || s.includes("special protection")) return "International";
    if (s.includes("sssi") || s.includes("special scientific") || s.includes("nnr") || s.includes("national nature") || s.includes("national park") || s.includes("aonb") || s.includes("outstanding natural beauty")) return "National";
    return "Local";
  }

  function importanceClass(imp) {
    if (imp === "International") return "badge-intl";
    if (imp === "National") return "badge-natl";
    return "badge-local";
  }

  function citationUrl(attrs, cfg) {
    // Each designation type has a different code field and URL pattern
    const shortName = (cfg?.shortName || "").toLowerCase();

    // SSSI — REF_CODE → SiteCitation.aspx
    if (shortName.includes("sssi") || shortName.includes("special scientific")) {
      const code = attrs["REF_CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteCitation.aspx?SiteCode=S${code}`;
    }

    // SAC — SAC_CODE → SiteDetail
    if (shortName.includes("sac") || shortName.includes("special area")) {
      const code = attrs["SAC_CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=${code}`;
    }

    // SPA — SPA_CODE → SiteDetail
    if (shortName.includes("spa") || shortName.includes("special protection")) {
      const code = attrs["SPA_CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=${code}`;
    }

    // Ramsar — CODE → SiteDetail
    if (shortName.includes("ramsar")) {
      const code = attrs["CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=${code}`;
    }

    // NNR — REF_CODE → SiteCitation (same pattern as SSSI)
    if (shortName.includes("nnr") || shortName.includes("national nature")) {
      const code = attrs["REF_CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteCitation.aspx?SiteCode=S${code}`;
      if (attrs["HYPERLINK"] && attrs["HYPERLINK"].startsWith("http")) return attrs["HYPERLINK"];
    }

    // LNR — REF_CODE → SiteDetail
    if (shortName.includes("lnr") || shortName.includes("local nature")) {
      const code = attrs["REF_CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=S${code}`;
    }

    // AONB — HOTLINK field, or CODE
    if (shortName.includes("aonb") || shortName.includes("outstanding natural beauty")) {
      if (attrs["HOTLINK"]) return attrs["HOTLINK"];
      const code = attrs["CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=${code}`;
    }

    // National Park — HOTLINK field, or CODE
    if (shortName.includes("national park")) {
      if (attrs["HOTLINK"]) return attrs["HOTLINK"];
      const code = attrs["CODE"];
      if (code) return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=${code}`;
    }

    return null;
  }

  function locStr(distM, dir) {
    if (distM === null) return "within the buffer";
    if (distM < 50) return "within or adjoining the site";
    return `approx. ${(distM/1000).toFixed(1)}km ${dir || ""} of the site at its nearest point`;
  }

  // ── Wales detection ───────────────────────────────────────────────────────
  // Converts Web Mercator centroid to approximate WGS84 and checks if it
  // falls within the approximate bounding box of Wales.
  function isInWales(geom) {
    if (!geom || !geom.extent) return false;
    const cx = (geom.extent.xmin + geom.extent.xmax) / 2;
    const cy = (geom.extent.ymin + geom.extent.ymax) / 2;
    // Web Mercator → approximate WGS84
    const lon = (cx / 20037508.34) * 180;
    const lat = (Math.atan(Math.exp((cy / 20037508.34) * Math.PI)) * 360 / Math.PI) - 90;
    // Wales bounding box (approximate): lon -5.35 to -2.65, lat 51.35 to 53.45
    return lon >= -5.35 && lon <= -2.65 && lat >= 51.35 && lat <= 53.45;
  }

  // ── Main report builder (async — calculates distances) ────────────────────
  async function buildReport(results, buffers, rlbGeom) {
    const bLabel = km => km >= 1 ? `${km}km` : `${km*1000}m`;
    const date = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    const inWales = isInWales(rlbGeom);
    let paraNum = 1;
    const P = txt => `<p><span class="para-num">1.1.${paraNum++}</span>${txt}</p>`;
    const ph = txt => `<span class="placeholder">[${txt}]</span>`;

    // Helper: get the buffer label for a result
    const rBuf = r => bLabel(r.bufKm || buffers.national);

    const found   = CONFIG.layers.map(l => results[l.title]).filter(r => {
      if (!r) return false;
      if (r.status !== "found") return false;
      // Exclude Wales layers if site is not in Wales
      if (!inWales && r.cfg.wms && r.cfg.shortName.includes("Wales")) return false;
      return true;
    });
    const missing = CONFIG.layers.map(l => results[l.title]).filter(r => {
      if (!r || r.status !== "missing" || r.cfg.wms) return false;
      return true;
    });
    const wms = CONFIG.layers.map(l => results[l.title]).filter(r => {
      if (!r || r.status !== "missing" || !r.cfg.wms) return false;
      // Only include Wales WMS layers in the report if site is in Wales
      if (!inWales && r.cfg.shortName.includes("Wales")) return false;
      return true;
    });

    let html = `<h2>Desk Study Findings</h2>`;
    html += P(`The desk study was undertaken on ${date}. Search radii of ${bLabel(buffers.international)} (international designations), ${bLabel(buffers.national)} (national designations and habitats), ${bLabel(buffers.local)} (local designations) and ${bLabel(buffers.records)} (biodiversity records) were applied to the red line boundary (RLB) of the application site and interrogated against national open access ecological datasets.`);

    // ══ DESIGNATED SITES ═══════════════════════════════════════════════════
    html += `<h2>Designated Sites</h2><h3>Statutory Designated Sites</h3>`;

    const statutory = found.filter(r => r.cfg.type === "statutory");

    // Build flat deduplicated feature list with distances
    const statRows = [];
    const seenNames = new Set();
    for (const r of statutory) {
      for (const f of r.features) {
        let name = f.attributes[r.cfg.nameField] || "Unnamed";

        // Append designation type to name where the name field doesn't include it
        const sn = r.cfg.shortName.toLowerCase();
        if (sn.includes("ramsar") && !/ramsar/i.test(name)) {
          name = `${name} RAMSAR`;
        } else if ((sn.includes("nnr") || sn.includes("national nature")) && !/nnr|national nature reserve/i.test(name)) {
          name = `${name} NNR`;
        } else if (sn.includes("spa") && !/spa|special protection/i.test(name)) {
          name = `${name} SPA`;
        } else if (sn.includes("sac") && !/sac|special area/i.test(name)) {
          name = `${name} SAC`;
        }

        if (seenNames.has(name)) continue;
        seenNames.add(name);
        const distM = await nearestDistanceM(f.geometry, rlbGeom);
        const dir   = directionFromRlb(rlbGeom, f.geometry);
        const ha    = formatHa(f.attributes);
        const imp   = designationImportance(r.cfg.shortName);
        const cite  = citationUrl(f.attributes, r.cfg);
        statRows.push({ name, distM, dir, ha, attrs: f.attributes, cfg: r.cfg, imp, cite });
      }
    }
    statRows.sort((a, b) => (a.distM || 0) - (b.distM || 0));

    if (statRows.length === 0) {
      html += P(`No statutory designated sites for nature conservation were identified within the search area.`);
    } else {
      const intlRows = statRows.filter(r => r.imp === "International");
      const natlRows = statRows.filter(r => r.imp === "National");
      const localStatRows = statRows.filter(r => r.imp === "Local");
      const parts = [];
      if (intlRows.length) parts.push(`${intlRows.length} international designation${intlRows.length !== 1 ? "s" : ""} within a ${bLabel(buffers.international)} radius`);
      if (natlRows.length) parts.push(`${natlRows.length} national designation${natlRows.length !== 1 ? "s" : ""} within a ${bLabel(buffers.national)} radius`);
      if (localStatRows.length) parts.push(`${localStatRows.length} local designation${localStatRows.length !== 1 ? "s" : ""} within a ${bLabel(buffers.local)} radius`);
      html += P(`${statRows.length} statutory designated site${statRows.length !== 1 ? "s" : ""} for nature conservation ${statRows.length !== 1 ? "were" : "was"} identified during the desk study (${parts.join("; ")}) and ${statRows.length !== 1 ? "are" : "is"} summarised in Table 1 below.`);
      html += `<p><strong>Table 1: Summary of Statutory Designated Sites for Nature Conservation</strong></p>
      <table><thead><tr><th>Site Name</th><th>Size, Distance and Direction from Site</th><th>Reason for Designation</th><th>Importance</th></tr></thead><tbody>`;
      for (const row of statRows) {
        const sizeStr = row.ha ? `${row.ha} hectares<br>` : "";
        const distText = locStr(row.distM, row.dir);
        // Ensure "approx." prefix and capitalise first letter
        const distFormatted = distText.startsWith("approx.")
          ? "Approx. " + distText.slice(7)
          : distText.charAt(0).toUpperCase() + distText.slice(1);
        const reasonCell = row.cite
          ? `<a class="citation-link" href="${row.cite}" target="_blank">[Insert from NE citation ↗]</a>`
          : ph("Insert from NE citation");
        html += `<tr>
          <td>${row.name}</td>
          <td>${sizeStr}${distFormatted}</td>
          <td>${reasonCell}</td>
          <td><span class="badge ${importanceClass(row.imp)}">${row.imp}</span></td>
        </tr>`;
      }
      html += `</tbody></table>`;
    }

    // Local / non-statutory
    html += `<h3>Local and Non-Statutory Designated Sites</h3>`;
    const lnrRows = statRows.filter(r => r.imp === "Local");
    if (lnrRows.length === 0) {
      html += P(`No local or non-statutory designated sites for nature conservation were identified within the ${bLabel(buffers.local)} search radius.`);
    } else {
      const n = lnrRows.length;
      html += P(`${n === 1 ? "One" : n} local or non-statutory designated site${n !== 1 ? "s" : ""} for nature conservation ${n !== 1 ? "were" : "was"} identified and ${n !== 1 ? "are" : "is"} summarised in Table 2 below.`);
      html += `<p><strong>Table 2: Summary of Local and Non-Statutory Designated Sites for Nature Conservation</strong></p>
      <table><thead><tr><th>Site Name</th><th>Distance and Direction from Site</th><th>Reason for Designation</th><th>Importance</th></tr></thead><tbody>`;
      for (const row of lnrRows) {
        html += `<tr>
          <td>${row.name}</td>
          <td>${locStr(row.distM, row.dir).charAt(0).toUpperCase() + locStr(row.distM, row.dir).slice(1)}</td>
          <td>${ph("Insert designation reason")}</td>
          <td><span class="badge badge-local">Local</span></td>
        </tr>`;
      }
      html += `</tbody></table>`;
    }

    html += P(`${ph("Insert Local Wildlife Sites (LWS) — open source data not available. Check with local LERC.")}`);

    // ══ HABITATS ════════════════════════════════════════════════════════════
    html += `<h2>Habitats</h2>`;
    const habitats = found.filter(r => r.cfg.type === "habitat");
    if (habitats.length === 0) {
      html += P(`No designated or priority habitats were identified within the ${bLabel(buffers.national)} search radius.`);
    } else {
      for (const r of habitats) {
        const countLabel = r.count >= 2000 ? `at least ${r.count.toLocaleString()}` : r.count.toLocaleString();

        if (r.cfg.groupByField) {
          // PHI — show total area per habitat type
          const areaByType = r._areaByType || {};
          const types = Object.entries(areaByType).sort((a,b) => b[1] - a[1]);
          const totalHa = Object.values(areaByType).reduce((s,v) => s+v, 0);
          const countLabel = r.count >= 2000 ? `at least ${r.count.toLocaleString()}` : r.count.toLocaleString();
          html += P(`${countLabel} parcel${r.count !== 1 ? "s" : ""} of ${r.cfg.shortName} ${r.count !== 1 ? "were" : "was"} identified within the ${rBuf(r)} buffer (total area approximately ${totalHa.toFixed(2)} ha), comprising the following habitat types:`);
          html += `<ul>` + types.map(([type, ha]) =>
            `<li><strong>${type}</strong> — ${ha.toFixed(2)} ha</li>`
          ).join("") + `</ul>`;
        } else {
          const habRows = [];
          for (const f of r.features) {
            const name   = f.attributes[r.cfg.nameField] || "Unclassified";
            const status = r.cfg.statusField ? (f.attributes[r.cfg.statusField] || "") : null;
            const distM  = await nearestDistanceM(f.geometry, rlbGeom);
            const dir    = directionFromRlb(rlbGeom, f.geometry);
            const ha     = formatHa(f.attributes);
            habRows.push({ name, status, distM, dir, ha });
          }
          habRows.sort((a, b) => (a.distM || 0) - (b.distM || 0));
          html += P(`${countLabel} parcel${r.count !== 1 ? "s" : ""} of ${r.cfg.shortName} ${r.count !== 1 ? "were" : "was"} identified within the ${rBuf(r)} buffer.`);
          if (habRows.length <= 15) {
            html += `<ul>` + habRows.map(f => {
              const statusStr = f.status ? ` (${f.status})` : "";
              const haStr = f.ha ? ` — ${f.ha} ha` : "";
              return `<li><strong>${f.name}</strong>${statusStr}${haStr} — ${locStr(f.distM, f.dir)}</li>`;
            }).join("") + `</ul>`;
          }
        }
      }
    }

    // ══ WATERCOURSES ════════════════════════════════════════════════════════
    const rivers = found.filter(r => r.cfg.type === "river");
    if (rivers.length) {
      html += `<h2>Watercourses and River Habitats</h2>`;
      for (const r of rivers) {
        const countLabel = r.count >= 2000 ? `at least ${r.count.toLocaleString()}` : r.count.toLocaleString();
        if (r.cfg.lengthField && r.features.length) {
          // Sum the length field across all returned features
          const totalKm = r.features.reduce((sum, f) => {
            const val = parseFloat(f.attributes[r.cfg.lengthField]);
            return sum + (isNaN(val) ? 0 : val);
          }, 0);
          const lengthStr = totalKm >= 1
            ? `${totalKm.toFixed(2)} km`
            : `${(totalKm * 1000).toFixed(0)} m`;
          const note = r.count >= 2000 ? ` (based on ${countLabel} features retrieved; true total may be higher)` : "";
          html += P(`The ${r.cfg.shortName} layer intersects the buffer, with a total watercourse length of approximately ${lengthStr} within the ${rBuf(r)} search area${note}.`);
        } else {
          html += P(`${countLabel} feature${r.count !== 1 ? "s" : ""} of the ${r.cfg.shortName} layer ${r.count !== 1 ? "were" : "was"} identified within the ${rBuf(r)} buffer.`);
        }
      }
    }

    // ══ BAT CONSULTATION ZONES ══════════════════════════════════════════════
    const bats = found.filter(r => r.cfg.type === "bat");
    if (bats.length) {
      html += `<h2>Bat Consultation Zones</h2>`;
      const zoneLines = bats.map(r => {
        const zoneName = r.cfg.shortName.replace("Bat Consultation Zone — ", "");
        const bands = r.names.length ? ` (${r.names.join(", ")})` : "";
        return `${zoneName}${bands}`;
      });
      html += P(`The red line boundary of the site falls within ${bats.length > 1 ? `${bats.length} Bat Consultation Zones` : "a Bat Consultation Zone"}: ${zoneLines.join("; ")}. Bat survey requirements should therefore be considered as part of any ecological assessment.`);
    }

    // ══ BIODIVERSITY RECORDS ════════════════════════════════════════════════
    const records = found.filter(r => r.cfg.type === "records");
    if (records.length) {
      html += `<h2>Biodiversity Records</h2>`;

      // Merge all species names across record sources
      const allNames = [];
      records.forEach(r => {
        const countLabel = r.count >= 2000 ? `at least ${r.count.toLocaleString()}` : r.count.toLocaleString();
        const uniqueNames = [...new Set(r.features.map(f => f.attributes[r.cfg.nameField]).filter(Boolean))];
        html += P(`A total of ${countLabel} ${r.cfg.shortName} ${r.count !== 1 ? "were" : "was"} retrieved within the ${rBuf(r)} buffer.`);
        uniqueNames.forEach(n => { if (!allNames.includes(n)) allNames.push(n); });
      });

      // Cross-reference against JNCC if lookup is available
      if (jnccLookup && Object.keys(jnccLookup).length > 0) {
        // Group protected species by taxon category
        const byCategory = {};
        allNames.forEach(name => {
          const match = lookupSpecies(name);
          if (!match) return;
          const cat = match.category || match.taxonGroup || "Other";
          if (!byCategory[cat]) byCategory[cat] = [];
          byCategory[cat].push({ name, designations: match.designations });
        });

        const protectedCount = Object.values(byCategory).reduce((s,v) => s+v.length, 0);
        const totalNames = allNames.length;

        if (protectedCount > 0) {
          html += P(`Of the ${totalNames} species recorded, ${protectedCount} ${protectedCount !== 1 ? "are" : "is"} listed under UK or international conservation legislation or Red Lists. These are summarised below by taxonomic group.`);
          Object.entries(byCategory).sort((a,b) => a[0].localeCompare(b[0])).forEach(([cat, spp]) => {
            html += `<p><strong>${cat.charAt(0).toUpperCase() + cat.slice(1)}</strong></p>`;
            html += `<ul>` + spp.map(s =>
              `<li><strong>${s.name}</strong> — ${s.designations.join("; ")}</li>`
            ).join("") + `</ul>`;
          });
        } else {
          html += P(`None of the ${totalNames} species recorded were identified on the JNCC Conservation Designations list under the selected legislation. This does not preclude the presence of protected species within the wider site area.`);
        }
        html += `<p style="font-size:10px;color:#666;font-style:italic">Species protection data: JNCC Conservation Designations for UK Taxa (December 2023), OGL v3.</p>`;
      } else if (jnccLookup === null) {
        html += P(`${ph("JNCC species protection lookup is still loading — re-run the desk study once the page has fully loaded to include protected species cross-referencing.")}`);
      } else {
        // Lookup failed — fall back to listing all species
        html += P(`Protected species cross-referencing was unavailable. All recorded species are listed below.`);
        records.forEach(r => {
          const uniqueNames = [...new Set(r.features.map(f => f.attributes[r.cfg.nameField]).filter(Boolean))];
          if (uniqueNames.length) {
            const listed = uniqueNames.slice(0, r.cfg.maxList || 10);
            const rem = uniqueNames.length - listed.length;
            html += `<ul>` + listed.map(n => `<li>${n}</li>`).join("") +
              (rem > 0 ? `<li><em>…and ${rem} further species</em></li>` : "") + `</ul>`;
          }
        });
      }
    }

    // ══ PLACEHOLDER SECTIONS ════════════════════════════════════════════════
    html += `<h2>Local BAP</h2>`;
    html += P(`${ph("Insert relevant Local Biodiversity Action Plan habitats and species.")}`);

    html += `<h2>Planning Policy</h2>`;
    html += P(`${ph("Insert relevant local planning policies identified from the Local Development Framework and Local Plan.")}`);

    // ══ DATA LIMITATIONS ════════════════════════════════════════════════════
    if (wms.length || missing.length) {
      html += `<h2>Data Limitations</h2>`;
      if (wms.length) html += P(`The following Welsh designation layers are served as WMS and could not be queried automatically — check visually in the map: ${wms.map(r => r.cfg.shortName).join(", ")}.`);
      if (missing.length) html += P(`The following layers could not be queried and should be verified manually: ${missing.map(r => r.cfg.shortName).join(", ")}.`);
    }

    return html;
  }
