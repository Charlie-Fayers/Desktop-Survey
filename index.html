  // ── Copy ──────────────────────────────────────────────────────────────────
  // ── Export to Word ────────────────────────────────────────────────────────
  // Pure vanilla JS — no external libraries, no AMD conflicts.
  // Builds a valid .docx (OOXML) using native browser Compression Streams API.

  // ── Zip builder (native DeflateRaw) ───────────────────────────────────────
  async function deflateRaw(data) {
    const cs = new CompressionStream("deflate-raw");
    const writer = cs.writable.getWriter();
    writer.write(data);
    writer.close();
    const chunks = [];
    const reader = cs.readable.getReader();
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      chunks.push(value);
    }
    const out = new Uint8Array(chunks.reduce((a,b) => a+b.length, 0));
    let off = 0;
    for (const c of chunks) { out.set(c, off); off += c.length; }
    return out;
  }

  function crc32(data) {
    let crc = 0xFFFFFFFF;
    const table = crc32.t || (crc32.t = (() => {
      const t = new Uint32Array(256);
      for (let i = 0; i < 256; i++) {
        let c = i;
        for (let j = 0; j < 8; j++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
        t[i] = c;
      }
      return t;
    })());
    for (let i = 0; i < data.length; i++) crc = table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
    return (crc ^ 0xFFFFFFFF) >>> 0;
  }

  function u16le(n) { return [n & 0xFF, (n >> 8) & 0xFF]; }
  function u32le(n) { return [n & 0xFF, (n >> 8) & 0xFF, (n >> 16) & 0xFF, (n >> 24) & 0xFF]; }

  async function buildZip(files) {
    // files: [{name, data: Uint8Array}]
    const enc = new TextEncoder();
    const entries = [];

    for (const f of files) {
      const nameBytes = enc.encode(f.name);
      const compressed = await deflateRaw(f.data);
      const crc = crc32(f.data);
      const localHeader = new Uint8Array([
        0x50,0x4B,0x03,0x04, // local file header sig
        0x14,0x00,           // version needed: 2.0
        0x00,0x00,           // general purpose flags
        0x08,0x00,           // compression: deflate
        0x00,0x00,           // mod time
        0x00,0x00,           // mod date
        ...u32le(crc),
        ...u32le(compressed.length),
        ...u32le(f.data.length),
        ...u16le(nameBytes.length),
        0x00,0x00,           // extra field length
        ...nameBytes,
      ]);
      entries.push({ nameBytes, localHeader, compressed, crc, uncompressedSize: f.data.length });
    }

    // Assemble local file entries
    const parts = [];
    let offset = 0;
    const offsets = [];
    for (const e of entries) {
      offsets.push(offset);
      parts.push(e.localHeader);
      parts.push(e.compressed);
      offset += e.localHeader.length + e.compressed.length;
    }

    // Central directory
    const cdParts = [];
    let cdSize = 0;
    for (let i = 0; i < entries.length; i++) {
      const e = entries[i];
      const cd = new Uint8Array([
        0x50,0x4B,0x01,0x02, // central dir sig
        0x14,0x00,           // version made by
        0x14,0x00,           // version needed
        0x00,0x00,           // flags
        0x08,0x00,           // compression
        0x00,0x00,0x00,0x00, // mod time/date
        ...u32le(e.crc),
        ...u32le(e.compressed.length),
        ...u32le(e.uncompressedSize),
        ...u16le(e.nameBytes.length),
        0x00,0x00,           // extra
        0x00,0x00,           // comment
        0x00,0x00,           // disk start
        0x00,0x00,           // int attrib
        0x00,0x00,0x00,0x00, // ext attrib
        ...u32le(offsets[i]),
        ...e.nameBytes,
      ]);
      cdParts.push(cd);
      cdSize += cd.length;
    }

    // End of central directory record
    const eocd = new Uint8Array([
      0x50,0x4B,0x05,0x06,
      0x00,0x00,0x00,0x00,
      ...u16le(entries.length),
      ...u16le(entries.length),
      ...u32le(cdSize),
      ...u32le(offset),
      0x00,0x00,
    ]);

    const all = [...parts, ...cdParts, eocd];
    const total = all.reduce((a, b) => a + b.length, 0);
    const out = new Uint8Array(total);
    let pos = 0;
    for (const p of all) { out.set(p, pos); pos += p.length; }
    return out;
  }

  // ── OOXML builder ──────────────────────────────────────────────────────────
  window.exportToWord = async function() {
    const btn = document.getElementById("btnExport");
    btn.textContent = "Generating\u2026";
    btn.disabled = true;
    try {
      const el = document.getElementById("reportBody");
      const enc = new TextEncoder();
      const FONT="Century Gothic", GREEN="1A3D2B", ALT="F4F9F5", SZ9="18", SZ8="16";
      const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

      function rpr(sz,bold,col) {
        return `<w:rPr>${bold?"<w:b/>":""}<w:color w:val="${col||"111D13"}"/><w:sz w:val="${sz||SZ9}"/><w:szCs w:val="${sz||SZ9}"/><w:rFonts w:ascii="${FONT}" w:hAnsi="${FONT}" w:cs="${FONT}"/></w:rPr>`;
      }
      function run(t,sz,bold,col){ return `<w:r>${rpr(sz,bold,col)}<w:t xml:space="preserve">${esc(t)}</w:t></w:r>`; }
      function par(runs,after){ return `<w:p><w:pPr><w:spacing w:after="${after||80}"/></w:pPr>${runs}</w:p>`; }

      // Collect hyperlinks as we build — each gets a unique rId
      const hyperlinkRels = [];
      function hlRun(text, href, sz) {
        const rId = `rLnk${hyperlinkRels.length + 2}`; // rId1 = styles
        hyperlinkRels.push({ rId, href });
        return `<w:hyperlink r:id="${rId}" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><w:r><w:rPr><w:rStyle w:val="Hyperlink"/><w:color w:val="2D6A4F"/><w:u w:val="single"/><w:sz w:val="${sz||SZ8}"/><w:szCs w:val="${sz||SZ8}"/><w:rFonts w:ascii="${FONT}" w:hAnsi="${FONT}" w:cs="${FONT}"/></w:rPr><w:t>${esc(text)}</w:t></w:r></w:hyperlink>`;
      }

      // Build cell content — handles inline <a> tags as Word hyperlinks
      function cellContent(td, sz, isHdr, textCol) {
        const parts = [];
        td.childNodes.forEach(n => {
          if (n.nodeType === 3) { // text node
            const t = n.textContent.trim();
            if (t) parts.push(run(t, sz, isHdr, textCol));
          } else if (n.nodeType === 1 && n.tagName === "A") {
            const href = n.getAttribute("href");
            const t = n.innerText.trim();
            if (href && t) parts.push(hlRun(t, href, sz));
            else if (t) parts.push(run(t, sz, false, "2D6A4F"));
          } else if (n.nodeType === 1) {
            const t = n.innerText?.trim();
            if (t) parts.push(run(t, sz, isHdr, textCol));
          }
        });
        return parts.join("") || run(td.innerText.trim(), sz, isHdr, textCol);
      }

      // ── Layout constants ──────────────────────────────────────────────────
      const BODY_L = 1080;  // body text indent (twips) — ~1.9cm
      const AFTER  = 240;   // space after paragraph (~1 line gap at 12pt)
      const FONT_COLOR = "000000";

      // Numbered paragraph: number at col 0, tab to BODY_L, wrapped lines at BODY_L
      function numberedPPr(before) {
        return `<w:pPr>
          <w:jc w:val="both"/>
          <w:spacing w:line="240" w:lineRule="auto" w:before="${before||0}" w:after="${AFTER}"/>
          <w:ind w:left="${BODY_L}" w:hanging="${BODY_L}"/>
          <w:tabs><w:tab w:val="left" w:pos="${BODY_L}"/></w:tabs>
        </w:pPr>`;
      }

      // Plain indented paragraph (headings, table captions, bullets)
      function indentPPr(before, after, extraLeft) {
        return `<w:pPr>
          <w:jc w:val="both"/>
          <w:spacing w:line="240" w:lineRule="auto" w:before="${before||0}" w:after="${after||AFTER}"/>
          <w:ind w:left="${BODY_L + (extraLeft||0)}"/>
        </w:pPr>`;
      }

      let body = "";
      el.childNodes.forEach(node => {
        if (node.nodeType !== 1) return;
        const tag = node.tagName.toLowerCase();

        if (tag === "h2") {
          // Section heading — bold black, indented
          body += `<w:p>${indentPPr(200,80)}<w:r>${rpr(SZ9,true,FONT_COLOR)}<w:t>${esc(node.innerText)}</w:t></w:r></w:p>`;

        } else if (tag === "h3") {
          // Sub-heading — italic underline, indented
          body += `<w:p>${indentPPr(80,40)}<w:r><w:rPr><w:i/><w:u w:val="single"/><w:sz w:val="${SZ9}"/><w:szCs w:val="${SZ9}"/><w:rFonts w:ascii="${FONT}" w:hAnsi="${FONT}" w:cs="${FONT}"/></w:rPr><w:t>${esc(node.innerText)}</w:t></w:r></w:p>`;

        } else if (tag === "p") {
          const ns = node.querySelector(".para-num");
          const ph = node.querySelector(".placeholder");
          const bodyText = node.innerText.replace(ns?.innerText||"","").trim();
          const textCol = ph ? "8A6200" : FONT_COLOR;

          if (ns) {
            // Number + TAB + text — hanging indent keeps wrapped lines aligned
            body += `<w:p>${numberedPPr()}<w:r>${rpr(SZ9,true,FONT_COLOR)}<w:t>${esc(ns.innerText)}</w:t></w:r><w:r><w:rPr><w:sz w:val="${SZ9}"/><w:szCs w:val="${SZ9}"/><w:rFonts w:ascii="${FONT}" w:hAnsi="${FONT}" w:cs="${FONT}"/></w:rPr><w:tab/></w:r><w:r>${rpr(SZ9,false,textCol)}<w:t xml:space="preserve">${esc(bodyText)}</w:t></w:r></w:p>`;
          } else {
            body += `<w:p>${indentPPr()}<w:r>${rpr(SZ9,false,textCol)}<w:t xml:space="preserve">${esc(bodyText)}</w:t></w:r></w:p>`;
          }

        } else if (tag === "ul") {
          node.querySelectorAll("li").forEach(li => {
            body += `<w:p>${indentPPr(0,40,280)}<w:r>${rpr(SZ9,false,FONT_COLOR)}<w:t xml:space="preserve">\u2022  ${esc(li.innerText)}</w:t></w:r></w:p>`;
          });

        } else if (tag === "table") {
          const rows = node.querySelectorAll("tr");
          let tbl = `<w:tbl><w:tblPr><w:tblW w:w="9000" w:type="dxa"/><w:tblBorders><w:top w:val="single" w:sz="4" w:color="C9DECE"/><w:left w:val="single" w:sz="4" w:color="C9DECE"/><w:bottom w:val="single" w:sz="4" w:color="C9DECE"/><w:right w:val="single" w:sz="4" w:color="C9DECE"/><w:insideH w:val="single" w:sz="4" w:color="C9DECE"/><w:insideV w:val="single" w:sz="4" w:color="C9DECE"/></w:tblBorders></w:tblPr>`;
          rows.forEach((tr,ri) => {
            const cells = tr.querySelectorAll("th,td");
            const isHdr = cells[0]?.tagName==="TH";
            const fill = isHdr ? GREEN : (ri%2===0?"FFFFFF":ALT);
            const cw = Math.floor(9000/cells.length);
            let row = "<w:tr>";
            cells.forEach(td => {
              const content = isHdr
                ? run(td.innerText.trim(), SZ8, true, "FFFFFF")
                : cellContent(td, SZ8, false, FONT_COLOR);
              row += `<w:tc><w:tcPr><w:tcW w:w="${cw}" w:type="dxa"/><w:shd w:val="clear" w:fill="${fill}"/></w:tcPr><w:p><w:pPr><w:spacing w:line="240" w:lineRule="auto" w:after="40" w:before="40"/></w:pPr>${content}</w:p></w:tc>`;
            });
            tbl += row + "</w:tr>";
          });
          body += tbl + "</w:tbl><w:p/>";
        }
      });

      // Build document.xml with correct namespace for hyperlinks
      const docXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><w:body>${body}<w:sectPr><w:pgMar w:top="720" w:right="720" w:bottom="720" w:left="1080"/></w:sectPr></w:body></w:document>`;
      const stylesXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:styles xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:docDefaults><w:rPrDefault><w:rPr><w:rFonts w:ascii="${FONT}" w:hAnsi="${FONT}" w:cs="${FONT}"/><w:sz w:val="${SZ9}"/><w:szCs w:val="${SZ9}"/></w:rPr></w:rPrDefault><w:pPrDefault><w:pPr><w:tabs><w:tab w:val="left" w:pos="${BODY_L}"/></w:tabs></w:pPr></w:pPrDefault></w:docDefaults></w:styles>`;
      const ctXml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/><Override PartName="/word/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.styles+xml"/></Types>`;
      const rootRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>`;

      // Build docRels including all hyperlinks collected during body build
      const hlRelsXml = hyperlinkRels.map(h =>
        `<Relationship Id="${h.rId}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/hyperlink" Target="${h.href.replace(/&/g,"&amp;")}" TargetMode="External"/>`
      ).join("");
      const docRels = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>${hlRelsXml}</Relationships>`;

      const zipData = await buildZip([
        { name: "[Content_Types].xml",          data: enc.encode(ctXml) },
        { name: "_rels/.rels",                  data: enc.encode(rootRels) },
        { name: "word/document.xml",            data: enc.encode(docXml) },
        { name: "word/styles.xml",              data: enc.encode(stylesXml) },
        { name: "word/_rels/document.xml.rels", data: enc.encode(docRels) },
      ]);

      const blob = new Blob([zipData], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Desk_Study_${new Date().toISOString().slice(0,10)}.docx`;
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = "\u2713 Downloaded";
      setTimeout(() => { btn.textContent = "\uD83D\uDCC4 Export to Word"; btn.disabled = false; }, 2500);
    } catch(e) {
      console.error("Word export failed:", e);
      btn.textContent = "Export failed \u2014 see console";
      btn.disabled = false;
    }
  };

  // ── Search ────────────────────────────────────────────────────────────────
  let searchDebounce = null;

  window.onSearchInput = function(val) {
    clearTimeout(searchDebounce);
    if (!val.trim()) { hideSearchResults(); return; }
    searchDebounce = setTimeout(() => suggestSearch(val), 300);
  };

  async function suggestSearch(query) {
    const results = [];

    // ── Search Red Line Boundary layer ───────────────────────────────────────
    try {
      const redLayers = [];
      function collectRed(layers) {
        layers.forEach(l => {
          if (CONFIG.redLineTitlePattern.test(l.title)) redLayers.push(l);
          if (l.type === "group" && l.layers) collectRed(l.layers);
        });
      }
      collectRed(webMap.layers);
      console.log("RLB layers found:", redLayers.map(l => `${l.title} [${l.type}] url=${l.url}`));

      for (const layer of redLayers) {
        // Ensure layer is loaded so its URL is available
        try { await layer.load(); } catch(e) {}

        let url = layer.url;
        if (!url) { console.log("RLB layer has no URL:", layer.title); continue; }
        if (layer.layerId !== undefined && layer.layerId !== null) url += `/${layer.layerId}`;
        console.log("Searching RLB at:", url);

        const safe = query.replace(/'/g, "''");
        const q = new Query({
          where: `Label LIKE '%${safe}%'`,
          outFields: ["*"],
          returnGeometry: true,
          num: 8,
        });
        try {
          const fs = await queryREST.executeQueryJSON(url, q);
          console.log("RLB search results:", fs.features?.length);
          (fs.features || []).forEach(f => {
            const name = f.attributes["Label"] || f.attributes["Boundary_type"] || `Feature ${f.attributes["OBJECTID"]}`;
            results.push({ label: name, type: "RLB", geometry: f.geometry });
          });
        } catch(e) { console.log("RLB query error:", e.message); }
      }
    } catch(e) { console.log("RLB search outer error:", e.message); }

    // ── Geocode ───────────────────────────────────────────────────────────────
    try {
      const encoded = encodeURIComponent(query + ", United Kingdom");
      const resp = await fetch(
        `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/suggest?text=${encoded}&maxSuggestions=5&f=json`
      );
      const data = await resp.json();
      (data.suggestions || []).forEach(s => {
        results.push({ label: s.text, type: "Place", magicKey: s.magicKey });
      });
    } catch(e) {}

    showSearchResults(results);
  }

  window.runSearch = function() {
    suggestSearch(document.getElementById("searchInput").value);
  };

  function showSearchResults(results) {
    const container = document.getElementById("searchResults");
    container.innerHTML = "";
    if (!results.length) {
      container.innerHTML = `<div class="search-result-item" style="color:var(--ink-faint)">No results found</div>`;
      container.classList.add("active");
      return;
    }
    results.forEach(r => {
      const div = document.createElement("div");
      div.className = "search-result-item";
      div.innerHTML = `${r.label} <span class="result-type">${r.type}</span>`;
      div.onclick = () => selectSearchResult(r);
      container.appendChild(div);
    });
    container.classList.add("active");
  }

  function hideSearchResults() {
    document.getElementById("searchResults").classList.remove("active");
  }

  async function selectSearchResult(result) {
    document.getElementById("searchInput").value = result.label;
    hideSearchResults();

    if (result.geometry) {
      // RLB feature — zoom and auto-select as the active boundary
      view.goTo({ target: result.geometry, zoom: 15 });

      // Auto-select: set as selectedGeom and update UI as if user clicked it
      selectedGeom = result.geometry;
      document.getElementById("btnSelect").classList.remove("selecting");
      document.getElementById("btnSelect").classList.add("selected");
      document.getElementById("btnSelectLabel").textContent = `✓ ${result.label}`;
      document.getElementById("btnRun").disabled = false;
      setStatus("info", `✓ "${result.label}" selected — ready to run desk study.`);

    } else if (result.magicKey) {
      // Geocoded place — zoom only
      try {
        const encoded = encodeURIComponent(result.label);
        const resp = await fetch(
          `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?SingleLine=${encoded}&magicKey=${result.magicKey}&outFields=&f=json`
        );
        const data = await resp.json();
        const loc = data.candidates?.[0]?.location;
        if (loc) view.goTo({ target: { x: loc.x, y: loc.y, spatialReference: { wkid: 4326 } }, zoom: 14 });
      } catch(e) {}
    }
  }

  // Close search results when clicking outside
  document.addEventListener("click", e => {
    if (!document.getElementById("searchBar")?.contains(e.target)) hideSearchResults();
  });

  // ── Reset ─────────────────────────────────────────────────────────────────
  window.resetTool = function() {
    resetState(true);
  };

  function resetState(full) {
    if (clickHandler) { clickHandler.remove(); clickHandler = null; }
    if (full) {
      selectedGeom = null;
      if (bufferGraphic) { view.graphics.remove(bufferGraphic); bufferGraphic = null; }
      document.getElementById("btnSelect").classList.remove("selecting", "selected");
      document.getElementById("btnSelectLabel").textContent = "Select red line boundary";
      document.getElementById("btnRun").disabled = true;
      document.getElementById("btnRunLabel").textContent = "Run Desk Study";
      document.getElementById("layerResults").style.display = "none";
      document.getElementById("reportBox").classList.remove("visible");
      document.getElementById("btnReset").style.display = "none";
      hideProgress();
      clearStatus();
    }
    view.cursor = "default";
    document.getElementById("selectOverlay").classList.remove("active");
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(type, msg) {
    const el = document.getElementById("statusBar");
    el.className = `status-bar ${type}`;
    el.textContent = msg;
  }
  function clearStatus() {
    const el = document.getElementById("statusBar");
    el.className = "status-bar";
    el.textContent = "";
  }
  function showProgress(pct, label) {
    document.getElementById("progressWrap").classList.add("active");
    document.getElementById("progressBar").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = label;
  }
  function hideProgress() {
    document.getElementById("progressWrap").classList.remove("active");
  }
  function resetRunButton() {
    document.getElementById("btnRun").disabled = false;
    document.getElementById("btnRunLabel").textContent = "Run Desk Study";
  }

}); // end require
</script>
</body>
</html>
