<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ecological Screening Tool</title>

  <!-- ArcGIS Maps SDK 4.29 -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>

  <style>
    /* ── Tokens ──────────────────────────────────────────────────── */
    :root {
      --green-dark:   #1a3d2b;
      --green-mid:    #2d6a4f;
      --green-bright: #52b788;
      --green-light:  #d8f3dc;
      --green-pale:   #f0faf3;
      --amber:        #e9c46a;
      --amber-dark:   #8a6200;
      --red:          #c1121f;
      --red-light:    #fff0f0;
      --ink:          #111d13;
      --ink-mid:      #3a4a3e;
      --ink-faint:    #6b7c6f;
      --line:         #c9dece;
      --surface:      #ffffff;
      --bg:           #f4f9f5;
      --radius:       6px;
      --radius-lg:    10px;
      --shadow:       0 2px 8px rgba(29,63,40,.10);
      --shadow-lg:    0 6px 24px rgba(29,63,40,.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: var(--bg);
      color: var(--ink);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--green-dark);
      color: #fff;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      z-index: 10;
    }
    header svg { flex-shrink: 0; }
    header h1 {
      font-size: 15px;
      font-weight: normal;
      letter-spacing: .03em;
    }
    header h1 strong { font-weight: bold; font-size: 16px; }
    header p { font-size: 11px; color: var(--green-bright); margin-top: 1px; letter-spacing: .02em; }

    /* ── Layout ─────────────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panel ──────────────────────────────────────────────────── */
    .panel {
      width: 340px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-inner {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    .panel-inner::-webkit-scrollbar { width: 5px; }
    .panel-inner::-webkit-scrollbar-track { background: transparent; }
    .panel-inner::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }

    /* ── Map ────────────────────────────────────────────────────── */
    #viewDiv {
      flex: 1;
      position: relative;
    }

    /* ── Section label ──────────────────────────────────────────── */
    .section-label {
      font-size: 10px;
      font-weight: bold;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 8px;
      margin-top: 18px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ── Config note ────────────────────────────────────────────── */
    .config-note {
      background: #fffbea;
      border: 1px solid #f0d060;
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 11px;
      color: #6b5200;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .config-note strong { font-weight: bold; }

    /* ── Buffer control ─────────────────────────────────────────── */
    .buffer-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
    }
    .buffer-row input[type=number] {
      width: 80px;
      padding: 6px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Georgia', serif;
      color: var(--ink);
      background: var(--surface);
    }
    .buffer-row input[type=number]:focus {
      outline: none;
      border-color: var(--green-mid);
      box-shadow: 0 0 0 3px rgba(45,106,79,.15);
    }
    .buffer-row span { font-size: 13px; color: var(--ink-mid); }
    .preset-row { display: flex; gap: 5px; }
    .preset-btn {
      padding: 4px 10px;
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--bg);
      color: var(--ink-mid);
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s;
      font-family: 'Georgia', serif;
    }
    .preset-btn:hover { border-color: var(--green-mid); color: var(--green-dark); }
    .preset-btn.active {
      background: var(--green-dark);
      border-color: var(--green-dark);
      color: #fff;
    }

    /* ── Buttons ────────────────────────────────────────────────── */
    .step-btn {
      width: 100%;
      padding: 9px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-family: 'Georgia', serif;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      border: 1px solid transparent;
    }
    .step-num {
      width: 20px; height: 20px;
      border-radius: 50%;
      font-size: 11px;
      font-weight: bold;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .btn-select {
      background: var(--surface);
      border-color: var(--line);
      color: var(--ink);
    }
    .btn-select .step-num { background: var(--green-light); color: var(--green-dark); }
    .btn-select:hover:not(:disabled) { border-color: var(--green-mid); }
    .btn-select.selecting {
      background: var(--green-light);
      border-color: var(--green-mid);
      color: var(--green-dark);
      animation: pulse-border 1.4s ease-in-out infinite;
    }
    .btn-select.selected {
      border-color: var(--green-bright);
      background: var(--green-pale);
    }
    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 0 0 rgba(82,183,136,.3); }
      50%      { box-shadow: 0 0 0 5px rgba(82,183,136,0); }
    }
    .btn-run {
      background: var(--green-mid);
      color: #fff;
      border-color: var(--green-mid);
      font-weight: bold;
    }
    .btn-run .step-num { background: rgba(255,255,255,.25); color: #fff; }
    .btn-run:hover:not(:disabled) { background: var(--green-dark); border-color: var(--green-dark); }
    .btn-run:disabled {
      background: #b0c8b8;
      border-color: #b0c8b8;
      cursor: not-allowed;
      color: rgba(255,255,255,.7);
    }

    /* ── Status ─────────────────────────────────────────────────── */
    .status-bar {
      font-size: 11px;
      padding: 6px 10px;
      border-radius: var(--radius);
      margin-bottom: 8px;
      display: none;
    }
    .status-bar.info  { background: var(--green-pale); color: var(--green-mid); border: 1px solid var(--line); display: block; }
    .status-bar.error { background: var(--red-light); color: var(--red); border: 1px solid #f5c0c0; display: block; }
    .status-bar.running { background: #f0f7ff; color: #1a5da0; border: 1px solid #b8d4f0; display: block; }

    /* ── Progress ───────────────────────────────────────────────── */
    .progress-wrap { display: none; margin-bottom: 10px; }
    .progress-wrap.active { display: block; }
    .progress-track {
      height: 4px;
      background: var(--line);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--green-bright);
      border-radius: 2px;
      transition: width .3s ease;
      width: 0%;
    }
    .progress-label { font-size: 10px; color: var(--ink-faint); margin-top: 4px; }

    /* ── Layer checklist ────────────────────────────────────────── */
    .layer-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: var(--radius);
      font-size: 11px;
      color: var(--ink-mid);
      border: 1px solid transparent;
    }
    .layer-item.found   { background: var(--green-pale); border-color: var(--line); color: var(--green-dark); }
    .layer-item.absent  { background: #fafafa; border-color: #ebebeb; color: var(--ink-faint); }
    .layer-item.missing { background: #fff8ee; border-color: #f5dfa0; color: #7a5200; }
    .layer-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
    }
    .layer-item.found   .layer-dot { background: var(--green-bright); }
    .layer-item.absent  .layer-dot { background: #ccc; }
    .layer-item.missing .layer-dot { background: var(--amber); }
    .layer-count {
      margin-left: auto;
      font-weight: bold;
      font-size: 11px;
    }

    /* ── Report ─────────────────────────────────────────────────── */
    .report-box {
      display: none;
      border: 1px solid var(--green-bright);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-top: 12px;
    }
    .report-box.visible { display: block; }
    .report-header {
      background: var(--green-dark);
      color: #fff;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .report-header span { font-size: 11px; letter-spacing: .05em; text-transform: uppercase; }
    .report-actions { display: flex; gap: 6px; }
    .report-action-btn {
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,.3);
      background: transparent;
      color: #fff;
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: background .15s;
    }
    .report-action-btn:hover { background: rgba(255,255,255,.15); }
    .report-action-btn.copied { background: var(--green-bright); border-color: var(--green-bright); color: var(--green-dark); }
    .report-body {
      padding: 14px;
      font-size: 12px;
      line-height: 1.7;
      color: var(--ink);
      background: var(--surface);
    }
    .report-body h2 {
      font-size: 13px;
      font-weight: bold;
      margin: 14px 0 4px;
      color: var(--ink);
    }
    .report-body h3 {
      font-size: 12px;
      font-weight: bold;
      margin: 10px 0 4px;
      color: var(--ink);
    }
    .report-body p {
      margin: 0 0 8px;
    }
    .report-body .para-num {
      font-weight: bold;
      margin-right: 6px;
    }
    .report-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin: 8px 0 14px;
    }
    .report-body th {
      background: var(--green-dark);
      color: #fff;
      padding: 5px 8px;
      text-align: left;
      font-weight: 500;
    }
    .report-body td {
      padding: 5px 8px;
      border: 1px solid var(--line);
      vertical-align: top;
    }
    .report-body tr:nth-child(even) td { background: var(--bg); }
    .report-body .badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: bold;
    }
    .report-body .badge-intl  { background: #e8f4ed; color: var(--green-dark); }
    .report-body .badge-natl  { background: #e8f0fb; color: #1a3a6b; }
    .report-body .badge-local { background: #fef9e7; color: #7a5200; }
    .report-body .placeholder {
      background: #fffbea;
      border: 1px dashed #e0c060;
      border-radius: 3px;
      padding: 3px 6px;
      font-style: italic;
      color: #8a6200;
      font-size: 11px;
    }
    .report-body .citation-link {
      font-size: 10px;
      color: var(--green-mid);
      text-decoration: none;
    }
    .report-body .citation-link:hover { text-decoration: underline; }
    .report-body ul {
      margin: 4px 0 8px 16px;
      padding: 0;
    }
    .report-body ul li { margin-bottom: 2px; }

    /* ── Reset ──────────────────────────────────────────────────── */
    .reset-btn {
      width: 100%;
      padding: 7px;
      font-size: 11px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink-faint);
      cursor: pointer;
      font-family: 'Georgia', serif;
      transition: all .15s;
      margin-top: 6px;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    /* ── Layer panel toggle button ──────────────────────────────── */
    #layerToggleBtn {
      position: absolute;
      top: 12px; right: 12px;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 6px 10px;
      font-size: 12px;
      font-family: 'Georgia', serif;
      color: var(--ink-mid);
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color .15s;
    }
    #layerToggleBtn:hover { border-color: var(--green-mid); color: var(--green-dark); }
    #layerToggleBtn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

    /* ── Layer panel drawer ─────────────────────────────────────── */
    #layerPanel {
      position: absolute;
      top: 0; right: 0;
      width: 260px;
      height: 100%;
      background: var(--surface);
      border-left: 1px solid var(--line);
      box-shadow: -4px 0 16px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      z-index: 9;
      transform: translateX(100%);
      transition: transform .22s ease;
    }
    #layerPanel.open { transform: translateX(0); }
    .lp-header {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      font-size: 11px;
      font-weight: bold;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .lp-close { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 16px; line-height: 1; padding: 0 2px; }
    .lp-close:hover { color: var(--ink); }
    .lp-body { overflow-y: auto; flex: 1; padding: 8px 0; }
    .lp-body::-webkit-scrollbar { width: 4px; }
    .lp-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }
    .lp-group-row { display: flex; align-items: center; gap: 6px; padding: 5px 14px; cursor: pointer; user-select: none; }
    .lp-group-row:hover { background: var(--bg); }
    .lp-chevron { font-size: 9px; color: var(--ink-faint); transition: transform .15s; flex-shrink: 0; width: 10px; }
    .lp-chevron.open { transform: rotate(90deg); }
    .lp-group-check { width: 13px; height: 13px; accent-color: var(--green-mid); flex-shrink: 0; cursor: pointer; }
    .lp-group-label { font-size: 12px; font-weight: bold; color: var(--ink); flex: 1; }
    .lp-children { display: none; }
    .lp-children.open { display: block; }
    .lp-layer-row { display: flex; align-items: center; gap: 6px; padding: 4px 14px 4px 32px; cursor: pointer; }
    .lp-layer-row:hover { background: var(--bg); }
    .lp-layer-check { width: 13px; height: 13px; accent-color: var(--green-mid); flex-shrink: 0; cursor: pointer; }
    .lp-layer-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; border: 1px solid rgba(0,0,0,.12); }
    .lp-layer-label { font-size: 11px; color: var(--ink-mid); flex: 1; line-height: 1.3; }
    .lp-layer-row.wms .lp-layer-label { font-style: italic; color: var(--ink-faint); }

    /* ── Search bar ─────────────────────────────────────────────── */
    #searchBar {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: visible;
      width: 320px;
    }
    #searchInput {
      flex: 1;
      padding: 6px 10px;
      border: none;
      outline: none;
      font-size: 12px;
      font-family: 'Georgia', serif;
      color: var(--ink);
      background: transparent;
      min-width: 0;
    }
    #searchBtn {
      padding: 6px 10px;
      background: var(--green-dark);
      color: #fff;
      border: none;
      cursor: pointer;
      font-size: 13px;
      flex-shrink: 0;
      transition: background .15s;
    }
    #searchBtn:hover { background: var(--green-mid); }
    #searchResults {
      position: absolute;
      top: 100%;
      left: 0; right: 0;
      background: var(--surface);
      border: 1px solid var(--line);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      display: none;
      z-index: 20;
      max-height: 220px;
      overflow-y: auto;
    }
    #searchResults.active { display: block; }
    .search-result-item {
      padding: 7px 10px;
      font-size: 11px;
      color: var(--ink-mid);
      cursor: pointer;
      border-bottom: 1px solid var(--line);
      line-height: 1.4;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg); color: var(--green-dark); }
    .search-result-item .result-type { font-size: 10px; color: var(--ink-faint); margin-left: 4px; }

    /* ── Map selecting overlay ──────────────────────────────────── */
    #selectOverlay {
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      background: var(--green-dark);
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      font-family: 'Georgia', serif;
      pointer-events: none;
      display: none;
      z-index: 5;
      box-shadow: var(--shadow-lg);
      white-space: nowrap;
    }
    #selectOverlay.active { display: block; animation: fadeDown .2s ease; }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateX(-50%) translateY(-6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── Header ───────────────────────────────────────────────────────────── -->
<header>
  <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
    <circle cx="14" cy="14" r="13" stroke="#52b788" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="7" stroke="#52b788" stroke-width="1" stroke-dasharray="2 2"/>
    <circle cx="14" cy="14" r="3" fill="#52b788"/>
    <line x1="14" y1="1" x2="14" y2="5" stroke="#52b788" stroke-width="1.5"/>
    <line x1="14" y1="23" x2="14" y2="27" stroke="#52b788" stroke-width="1.5"/>
    <line x1="1" y1="14" x2="5" y2="14" stroke="#52b788" stroke-width="1.5"/>
    <line x1="23" y1="14" x2="27" y2="14" stroke="#52b788" stroke-width="1.5"/>
  </svg>
  <div>
    <h1><strong>Clarkson & Woods Automated Desk Study</strong></h1>
    <p>Query layers within a pre-selected buffer distance of your RLB to produce a report paragraph</p>
  </div>
</header>

<!-- ── Layout ───────────────────────────────────────────────────────────── -->
<div class="layout">

  <!-- Panel -->
  <div class="panel">
    <div class="panel-inner">

      <!-- Buffer -->
      <div class="section-label">Buffer distance</div>
      <div class="buffer-row">
        <input type="number" id="bufferInput" value="2" min="0.1" max="20" step="0.5" />
        <span>km</span>
      </div>
      <div class="preset-row">
        <button class="preset-btn" data-km="0.5">0.5 km</button>
        <button class="preset-btn active" data-km="2">2 km</button>
        <button class="preset-btn" data-km="5">5 km</button>
        <button class="preset-btn" data-km="10">10 km</button>
      </div>

      <!-- Steps -->
      <div class="section-label">Steps</div>
      <div id="statusBar" class="status-bar"></div>

      <button class="step-btn btn-select" id="btnSelect" onclick="startSelection()">
        <span class="step-num">1</span>
        <span id="btnSelectLabel">Select red line boundary</span>
      </button>

      <button class="step-btn btn-run" id="btnRun" disabled onclick="runAnalysis()">
        <span class="step-num">2</span>
        <span id="btnRunLabel">Run Desk Study</span>
      </button>

      <!-- Progress -->
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        <div class="progress-label" id="progressLabel">Querying layers…</div>
      </div>

      <!-- Layer results -->
      <div id="layerResults" style="display:none">
        <div class="section-label">Layer results</div>
        <div class="layer-list" id="layerList"></div>
      </div>

      <!-- Report -->
      <div class="report-box" id="reportBox">
        <div class="report-header">
          <span>Desk Study Report</span>
          <div class="report-actions">
            <button class="report-action-btn" id="btnExport" onclick="exportToWord()">&#x1F4C4; Export to Word</button>
            <button class="report-action-btn" onclick="resetTool()">Reset</button>
          </div>
        </div>
        <div class="report-body" id="reportBody"></div>
      </div>

      <button class="reset-btn" id="btnReset" style="display:none" onclick="resetTool()">
        ↺ Start new screening
      </button>

    </div>
  </div>

  <!-- Map -->
  <div id="viewDiv">
    <div id="selectOverlay">Click a red line boundary feature on the map</div>

    <!-- Search bar -->
    <div id="searchBar">
      <input type="text" id="searchInput" placeholder="Search location or red line boundary…" autocomplete="off"
        onkeydown="if(event.key==='Enter') runSearch()"
        oninput="onSearchInput(this.value)" />
      <button id="searchBtn" onclick="runSearch()">&#x1F50D;</button>
      <div id="searchResults"></div>
    </div>

    <!-- Layer panel toggle -->
    <button id="layerToggleBtn" onclick="toggleLayerPanel()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="5" height="5" rx="1"/>
        <rect x="8" y="1" width="5" height="5" rx="1"/>
        <rect x="1" y="8" width="5" height="5" rx="1"/>

</div>

<!-- ── Script ────────────────────────────────────────────────────────────── -->
<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/WebMap",
  "esri/geometry/geometryEngineAsync",
  "esri/Graphic",
  "esri/rest/query",
  "esri/rest/support/Query",
  "esri/identity/OAuthInfo",
  "esri/identity/IdentityManager",
], function(
  Map, MapView, WebMap,
  geometryEngineAsync,
  Graphic, queryREST, Query,
  OAuthInfo, IdentityManager
) {

  // ══════════════════════════════════════════════════════════════════════════
  // ██  CONFIG
  // ══════════════════════════════════════════════════════════════════════════
  const CONFIG = {

    portalUrl: "https://www.arcgis.com",
    webMapId:  "51a20531f9f44c4682f1bb246981ea86",
    appId: "pduqao2ad2vWm62Z",

    // Matches the red line boundary layer by title
    redLineTitlePattern: /red.?line.?boundar/i,

    // ── Layers ──────────────────────────────────────────────────────────────
    // title        — exact layer title as it appears in the web map
    // shortName    — used in the report paragraph
    // nameField    — attribute field holding the designation/feature name
    //                set to null for layers where just the count is reported
    // type         — "statutory" | "habitat" | "river" | "bat" | "records"
    // groupByField — true: list unique nameField values (e.g. habitat types)
    // maxList      — max names to spell out before "and N others"
    layers: [

      // ── England: statutory designations ──────────────────────────────────
      { title: "Sites of Special Scientific Interest (England)",
        shortName: "Sites of Special Scientific Interest (SSSIs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Special Areas of Conservation (England)",
        shortName: "Special Areas of Conservation (SACs)",
        nameField: "SAC_NAME", type: "statutory", maxList: 4 },

      { title: "Special Protection Areas (England)",
        shortName: "Special Protection Areas (SPAs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Ramsar (England)",
        shortName: "Ramsar wetland sites",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "National Nature Reserves (England)",
        shortName: "National Nature Reserves (NNRs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Local Nature Reserves (England)",
        shortName: "Local Nature Reserves (LNRs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "Areas of Outstanding Natural Beauty (England)",
        shortName: "Areas of Outstanding Natural Beauty (AONBs)",
        nameField: "NAME", type: "statutory", maxList: 4 },

      { title: "National Parks (England)",
        shortName: "National Parks",
        nameField: "NAME", type: "statutory", maxList: 4 },

      // ── Wales: statutory designations (WMS — display only, cannot query) ──
      { title: "SSSI",
        shortName: "Sites of Special Scientific Interest (SSSIs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "SAC",
        shortName: "Special Areas of Conservation (SACs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "SPA",
        shortName: "Special Protection Areas (SPAs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "RAMSAR",
        shortName: "Ramsar wetland sites (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "NNR",
        shortName: "National Nature Reserves (NNRs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "LNR",
        shortName: "Local Nature Reserves (LNRs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "AONB",
        shortName: "Areas of Outstanding Natural Beauty (AONBs) (Wales)",
        nameField: null, type: "statutory", wms: true },

      { title: "National Park",
        shortName: "National Parks (Wales)",
        nameField: null, type: "statutory", wms: true },

      // ── England: habitats ─────────────────────────────────────────────────
      { title: "Ancient Woodland (England)",
        shortName: "ancient woodland",
        nameField: "NAME", type: "habitat", maxList: 4 },

      { title: "Priority Habitats Inventory (England)",
        shortName: "Priority Habitat Inventory parcels",
        nameField: "MainHabs", type: "habitat",
        groupByField: true, maxList: 6 },

      // ── Wales: habitats (WMS — display only, cannot query) ───────────────
      { title: "Ancient Woodland",
        shortName: "ancient woodland (Wales)",
        nameField: null, type: "habitat", wms: true },

      { title: "Priority Habitats - High sensitivity (Wales)",
        shortName: "Priority Habitats of high sensitivity (Wales)",
        nameField: null, type: "habitat", wms: true },

      // ── River habitats ────────────────────────────────────────────────────
      { title: "Priority River Habitat - Rivers (England)",
        shortName: "Priority River Habitat — Rivers",
        nameField: null, type: "river" },

      { title: "Priority River Habitat - Headwater Areas (England)",
        shortName: "Priority River Habitat — Headwater Areas",
        nameField: null, type: "river" },

      { title: "Chalk Rivers (England)",
        shortName: "Chalk Rivers",
        nameField: null, type: "river" },

      { title: "EA Statutory Rivers",
        shortName: "EA Statutory Rivers",
        nameField: null, type: "river" },

      // ── Bat consultation zones (individual layers within group) ───────────
      { title: "Wiltshire",
        shortName: "Bat Consultation Zone — Wiltshire",
        nameField: null, type: "bat" },

      { title: "Trowbirdge SPD",
        shortName: "Bat Consultation Zone — Trowbridge SPD",
        nameField: null, type: "bat" },

      { title: "North Somerset and Mendips",
        shortName: "Bat Consultation Zone — North Somerset and Mendips",
        nameField: null, type: "bat" },

      { title: "Hestercombe House",
        shortName: "Bat Consultation Zone — Hestercombe House",
        nameField: null, type: "bat" },

      { title: "Exmoor and Quantocks",
        shortName: "Bat Consultation Zone — Exmoor and Quantocks",
        nameField: null, type: "bat" },

      { title: "Mells Valley",
        shortName: "Bat Consultation Zone — Mells Valley",
        nameField: null, type: "bat" },

      // ── Biodiversity records ──────────────────────────────────────────────
      { title: "iNaturalist Observations",
        shortName: "iNaturalist biodiversity observations",
        nameField: "common_name", type: "records", maxList: 5 },

      { title: "C&W In-house Records",
        shortName: "C&W in-house biodiversity records",
        nameField: "Common_Name", type: "records", maxList: 5 },
    ],
  };
  // ══════════════════════════════════════════════════════════════════════════

  // ── Auth ─────────────────────────────────────────────────────────────────
  if (CONFIG.appId) {
    const info = new OAuthInfo({
      appId: CONFIG.appId,
      portalUrl: CONFIG.portalUrl,
      popup: false,
    });
    IdentityManager.registerOAuthInfos([info]);

    // Check sign-in state; redirect to login if not authenticated
    IdentityManager.checkSignInStatus(CONFIG.portalUrl + "/sharing")
      .catch(() => IdentityManager.getCredential(CONFIG.portalUrl + "/sharing"));
  }

  // ── Map & View ────────────────────────────────────────────────────────────
  const webMap = new WebMap({ portalItem: { id: CONFIG.webMapId, portal: { url: CONFIG.portalUrl } } });
  const view = new MapView({
    container: "viewDiv",
    map: webMap,
    ui: { components: ["zoom", "compass", "attribution"] },
    popup: { autoOpenEnabled: false },  // suppress all popups
  });

  // Once the map loads, build the layer panel
  // Note: we do NOT force layer visibility — the map's default state is preserved.
  // Layers are queried via their REST endpoints regardless of visibility.
  view.when(() => {
    buildLayerPanel();
  });

  // ── Layer panel ───────────────────────────────────────────────────────────
  window.toggleLayerPanel = function() {
    const panel = document.getElementById("layerPanel");
    const btn   = document.getElementById("layerToggleBtn");
    panel.classList.toggle("open");
    btn.classList.toggle("active");
  };

  function buildLayerPanel() {
    const body = document.getElementById("layerPanelBody");
    body.innerHTML = "";

    // Render layers in reverse so top layers appear first (matches map draw order)
    const allLayers = webMap.layers.toArray().slice().reverse();
    allLayers.forEach(layer => renderLayerRow(layer, body, 0));
  }

  function renderLayerRow(layer, container, depth) {
    const isGroup = layer.type === "group";
    const isWms   = layer.type === "wms" || layer.type === "wmts";

    if (isGroup) {
      // ── Group row ──────────────────────────────────────────────
      const groupDiv = document.createElement("div");

      const row = document.createElement("div");
      row.className = "lp-group-row";

      const chevron = document.createElement("span");
      chevron.className = "lp-chevron open";
      chevron.textContent = "▶";

      const check = document.createElement("input");
      check.type = "checkbox";
      check.className = "lp-group-check";
      check.checked = layer.visible;
      check.addEventListener("change", e => {
        e.stopPropagation();
        layer.visible = check.checked;
        // Sync child checkboxes
        children.querySelectorAll("input[type=checkbox]").forEach(cb => {
          cb.checked = check.checked;
        });
        // Sync child layer visibility
        if (layer.layers) layer.layers.forEach(l => l.visible = check.checked);
      });

      const label = document.createElement("span");
      label.className = "lp-group-label";
      label.textContent = layer.title;

      row.appendChild(chevron);
      row.appendChild(check);
      row.appendChild(label);

      const children = document.createElement("div");
      children.className = "lp-children open";

      // Toggle expand/collapse on row click (not checkbox)
      row.addEventListener("click", e => {
        if (e.target === check) return;
        children.classList.toggle("open");
        chevron.classList.toggle("open");
      });

      groupDiv.appendChild(row);
      groupDiv.appendChild(children);
      container.appendChild(groupDiv);

      // Render children in reverse order
      if (layer.layers) {
        const childArr = layer.layers.toArray().slice().reverse();
        childArr.forEach(child => renderLayerRow(child, children, depth + 1));
      }

    } else {
      // ── Leaf layer row ─────────────────────────────────────────
      const row = document.createElement("div");
      row.className = "lp-layer-row" + (isWms ? " wms" : "");
      row.style.paddingLeft = (14 + depth * 14) + "px";

      const check = document.createElement("input");
      check.type = "checkbox";
      check.className = "lp-layer-check";
      check.checked = layer.visible;
      check.addEventListener("change", () => { layer.visible = check.checked; });

      // Colour swatch — try to get renderer colour
      const swatch = document.createElement("span");
      swatch.className = "lp-layer-swatch";
      try {
        const sym = layer.renderer?.symbol || layer.renderer?.defaultSymbol;
        const col = sym?.color;
        if (col) swatch.style.background = `rgba(${col.r},${col.g},${col.b},${col.a ?? 1})`;
        else swatch.style.background = "#aaa";
      } catch(e) { swatch.style.background = "#aaa"; }

      const label = document.createElement("span");
      label.className = "lp-layer-label";
      label.textContent = layer.title + (isWms ? " (WMS)" : "");

      row.appendChild(check);
      row.appendChild(swatch);
      row.appendChild(label);

      // Clicking the row (not checkbox) also toggles
      row.addEventListener("click", e => {
        if (e.target === check) return;
        check.checked = !check.checked;
        layer.visible = check.checked;
      });

      container.appendChild(row);
    }
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let clickHandler  = null;
  let selectedGeom  = null;
  let bufferGraphic = null;

  // ── Buffer preset buttons ─────────────────────────────────────────────────
  document.querySelectorAll(".preset-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("bufferInput").value = btn.dataset.km;
    });
  });
  document.getElementById("bufferInput").addEventListener("input", function() {
    document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
    const match = document.querySelector(`.preset-btn[data-km="${this.value}"]`);
    if (match) match.classList.add("active");
  });

  // ── Selection ─────────────────────────────────────────────────────────────
  window.startSelection = function() {
    resetState(false);
    setStatus("selecting");
    document.getElementById("btnSelect").classList.add("selecting");
    document.getElementById("btnSelectLabel").textContent = "Click boundary on map…";
    document.getElementById("selectOverlay").classList.add("active");
    view.cursor = "crosshair";

    if (clickHandler) clickHandler.remove();
    clickHandler = view.on("click", async event => {
      // Suppress default popup
      event.stopPropagation();

      // Find red line layers recursively through groups
      const redLayers = [];
      function collectRedLayers(layers) {
        layers.forEach(l => {
          if (CONFIG.redLineTitlePattern.test(l.title)) redLayers.push(l);
          if (l.type === "group" && l.layers) collectRedLayers(l.layers);
        });
      }
      collectRedLayers(webMap.layers);

      const hitResult = await view.hitTest(event, { include: redLayers.length ? redLayers : undefined });
      const hit = hitResult.results.find(r => r.graphic && r.graphic.geometry);

      if (!hit) {
        setStatus("error", "No boundary feature found at that location. Try clicking directly on the red line.");
        endSelection();
        return;
      }

      selectedGeom = hit.graphic.geometry;
      endSelection();
      setStatus("info", "✓ Boundary selected — ready to run screening.");
      document.getElementById("btnSelect").classList.add("selected");
      document.getElementById("btnSelectLabel").textContent = "✓ Boundary selected";
      document.getElementById("btnRun").disabled = false;
    });
  };

  function endSelection() {
    if (clickHandler) { clickHandler.remove(); clickHandler = null; }
    document.getElementById("btnSelect").classList.remove("selecting");
    document.getElementById("selectOverlay").classList.remove("active");
    view.cursor = "default";
  }

  // ── Analysis ──────────────────────────────────────────────────────────────
  window.runAnalysis = async function() {
    if (!selectedGeom) return;

    const bufferKm = parseFloat(document.getElementById("bufferInput").value) || 2;

    document.getElementById("btnRun").disabled = true;
    document.getElementById("btnRunLabel").textContent = "Running…";
    document.getElementById("layerResults").style.display = "none";
    document.getElementById("reportBox").classList.remove("visible");

    setStatus("running", "Building buffer and querying layers…");
    showProgress(5, "Building buffer…");

    const bufferMetres = bufferKm * 1000;

    // ── Create buffer in Web Mercator (compatible with all AGOL feature services)
    let geom = selectedGeom;
    showProgress(10, "Creating buffer…");
    console.log("Geometry type:", geom.type, "SR:", geom.spatialReference?.wkid);

    let bufGeom;
    try {
      bufGeom = await geometryEngineAsync.geodesicBuffer(geom, bufferMetres, "meters");
      console.log("Geodesic buffer created:", !!bufGeom);
    } catch(e) {
      console.error("geodesicBuffer failed:", e);
      try {
        bufGeom = await geometryEngineAsync.buffer(geom, bufferMetres, "meters");
        console.log("Planar buffer fallback created:", !!bufGeom);
      } catch(e2) {
        console.error("Planar buffer also failed:", e2);
      }
    }

    if (!bufGeom) {
      setStatus("error", "Failed to create buffer. Check the geometry of the selected feature.");
      resetRunButton();
      return;
    }

    // Draw buffer
    if (bufferGraphic) view.graphics.remove(bufferGraphic);
    bufferGraphic = new Graphic({
      geometry: bufGeom,
      symbol: {
        type: "simple-fill",
        color: [0, 110, 60, 0.06],
        outline: { color: [0, 110, 60, 0.65], width: 1.5, style: "dash" },
      },
    });
    view.graphics.add(bufferGraphic);
    view.goTo({ target: bufGeom, padding: { top: 40, bottom: 40, left: 40, right: 40 } });

    // ── Query all layers in parallel ─────────────────────────────────────────
    // Recursively find a layer by title through group layers
    function findLayer(layers, title) {
      for (let i = 0; i < layers.length; i++) {
        const l = layers.getItemAt(i);
        if (l.title === title) return l;
        if (l.type === "group" && l.layers) {
          const found = findLayer(l.layers, title);
          if (found) return found;
        }
      }
      return null;
    }

    const total = CONFIG.layers.length;
    let done = 0;
    const results = {};

    const promises = CONFIG.layers.map(async cfg => {
      const layer = findLayer(webMap.layers, cfg.title);

      if (!layer) {
        results[cfg.title] = { status: "missing", cfg };
        update();
        return;
      }

      // WMS layers cannot be queried via REST — mark for manual check
      if (layer.type === "wms" || layer.type === "wmts" || layer.type === "wms-sublayer") {
        results[cfg.title] = { status: "missing", cfg, error: "WMS layer — cannot query directly" };
        update();
        return;
      }

      // Build service URL
      let url = layer.url;
      if (layer.layerId !== undefined && layer.layerId !== null) url += `/${layer.layerId}`;
      else if (layer.sublayers && layer.sublayers.length) url += `/0`;
      console.log(`Querying "${cfg.title}" → ${url}`);

      try {
        const outFields = ["*"];
        const q = new Query({
          geometry: bufGeom,
          spatialRelationship: "intersects",
          outFields: outFields,
          returnGeometry: true,
          num: 500,
        });
        const fs = await queryREST.executeQueryJSON(url, q);
        const features = fs.features || [];
        const rawNames = features
          .map(f => f.attributes[cfg.nameField])
          .filter(Boolean);
        const unique = [...new Set(rawNames)];

        results[cfg.title] = {
          status: features.length > 0 ? "found" : "absent",
          count: features.length,
          names: unique,
          features: features,
          cfg,
        };
      } catch(e) {
        results[cfg.title] = { status: "missing", cfg, error: e.message };
      }
      update();
    });

    function update() {
      done++;
      const pct = Math.round((done / total) * 100);
      const remaining = CONFIG.layers.filter(l => !results[l.title]);
      const nextName = remaining.length ? remaining[0].title.split("(")[0].trim() : "Finalising…";
      showProgress(pct, `Querying: ${nextName}`);
    }

    await Promise.all(promises);

    hideProgress();
    renderLayerList(results);
    setStatus("running", "Calculating distances and building report…");
    const report = await buildReport(results, bufferKm, selectedGeom);
    renderReport(report);
    setStatus("info", `✓ Screening complete — ${CONFIG.layers.filter(l => results[l.title]?.status === "found").length} layer(s) with intersecting features.`);
    resetRunButton();
    document.getElementById("btnReset").style.display = "block";
  };

  // ── Layer results list ────────────────────────────────────────────────────
  function renderLayerList(results) {
    const list = document.getElementById("layerList");
    list.innerHTML = "";

    CONFIG.layers.forEach(cfg => {
      const r = results[cfg.title];
      if (!r) return;
      const item = document.createElement("div");
      item.className = `layer-item ${r.status}`;

      const dot = document.createElement("span");
      dot.className = "layer-dot";

      const name = document.createElement("span");
      name.textContent = cfg.title.replace(/\(.*?\)/g, "").trim();

      item.appendChild(dot);
      item.appendChild(name);

      if (r.status === "found") {
        const count = document.createElement("span");
        count.className = "layer-count";
        count.textContent = r.count;
        item.appendChild(count);
      } else if (r.status === "missing") {
        const tag = document.createElement("span");
        tag.className = "layer-count";
        tag.style.color = "#8a6200";
        tag.textContent = "not found";
        item.appendChild(tag);
      }

      list.appendChild(item);
    });

    document.getElementById("layerResults").style.display = "block";
  }

  // ── Distance and direction helpers ────────────────────────────────────────
  async function nearestDistanceM(featureGeom, rlbGeom) {
    try { return await geometryEngineAsync.distance(rlbGeom, featureGeom, "meters"); }
    catch(e) { return null; }
  }

  function bearingToCardinal(bearing) {
    const dirs = ["north","north-east","east","south-east","south","south-west","west","north-west"];
    return dirs[Math.round(((bearing % 360) + 360) % 360 / 45) % 8];
  }

  function directionFromRlb(rlbGeom, featureGeom) {
    if (!rlbGeom?.extent || !featureGeom?.extent) return null;
    const rc = { x: (rlbGeom.extent.xmin + rlbGeom.extent.xmax) / 2, y: (rlbGeom.extent.ymin + rlbGeom.extent.ymax) / 2 };
    const fc = { x: (featureGeom.extent.xmin + featureGeom.extent.xmax) / 2, y: (featureGeom.extent.ymin + featureGeom.extent.ymax) / 2 };
    return bearingToCardinal(Math.atan2(fc.x - rc.x, fc.y - rc.y) * 180 / Math.PI);
  }

  function formatHa(attrs) {
    const raw = attrs["Shape__Area"] || attrs["AreaHa"] || attrs["AREA"] || attrs["MEASURE"];
    if (!raw) return null;
    // Shape__Area is in map units (metres²) — convert to ha; AreaHa already in ha
    const val = attrs["AreaHa"] ? parseFloat(raw) : parseFloat(raw) / 10000;
    return val.toFixed(2);
  }

  function designationImportance(shortName) {
    const s = shortName.toLowerCase();
    if (s.includes("sac") || s.includes("spa") || s.includes("ramsar") || s.includes("special area") || s.includes("special protection")) return "International";
    if (s.includes("sssi") || s.includes("special scientific") || s.includes("nnr") || s.includes("national nature") || s.includes("national park") || s.includes("aonb") || s.includes("outstanding natural beauty")) return "National";
    return "Local";
  }

  function importanceClass(imp) {
    if (imp === "International") return "badge-intl";
    if (imp === "National") return "badge-natl";
    return "badge-local";
  }

  function citationUrl(attrs) {
    const code = attrs["REF_CODE"] || attrs["SAC_CODE"] || attrs["ID"] || attrs["REF"];
    if (!code) return null;
    return `https://designatedsites.naturalengland.org.uk/SiteDetail.aspx?SiteCode=S${code}`;
  }

  function locStr(distM, dir) {
    if (distM === null) return "within the buffer";
    if (distM < 50) return "within or adjoining the site";
    return `approx. ${(distM/1000).toFixed(1)}km ${dir || ""} of the site at its nearest point`;
  }

  // ── Main report builder (async — calculates distances) ────────────────────
  async function buildReport(results, bufferKm, rlbGeom) {
    const bufLabel = bufferKm >= 1 ? `${bufferKm}km` : `${bufferKm * 1000}m`;
    const date = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
    let paraNum = 1;
    const P = txt => `<p><span class="para-num">1.1.${paraNum++}</span>${txt}</p>`;
    const ph = txt => `<span class="placeholder">[${txt}]</span>`;

    const found   = CONFIG.layers.map(l => results[l.title]).filter(r => r?.status === "found");
    const missing = CONFIG.layers.map(l => results[l.title]).filter(r => r?.status === "missing" && !r.cfg.wms);
    const wms     = CONFIG.layers.map(l => results[l.title]).filter(r => r?.status === "missing" && r.cfg.wms);

    let html = `<h2>Desk Study Findings</h2>`;
    html += P(`A ${bufLabel} buffer was applied to the red line boundary (RLB) of the application site and interrogated against national open access ecological datasets on ${date}.`);

    // ══ DESIGNATED SITES ═══════════════════════════════════════════════════
    html += `<h2>Designated Sites</h2><h3>Statutory Designated Sites</h3>`;

    const statutory = found.filter(r => r.cfg.type === "statutory");

    // Build flat deduplicated feature list with distances
    const statRows = [];
    const seenNames = new Set();
    for (const r of statutory) {
      for (const f of r.features) {
        const name = f.attributes[r.cfg.nameField] || "Unnamed";
        if (seenNames.has(name)) continue;
        seenNames.add(name);
        const distM = await nearestDistanceM(f.geometry, rlbGeom);
        const dir   = directionFromRlb(rlbGeom, f.geometry);
        const ha    = formatHa(f.attributes);
        const imp   = designationImportance(r.cfg.shortName);
        const cite  = citationUrl(f.attributes);
        statRows.push({ name, distM, dir, ha, attrs: f.attributes, cfg: r.cfg, imp, cite });
      }
    }
    statRows.sort((a, b) => (a.distM || 0) - (b.distM || 0));

    if (statRows.length === 0) {
      html += P(`No statutory designated sites for nature conservation were identified within the ${bufLabel} search radius.`);
    } else {
      const n = statRows.length;
      html += P(`${n === 1 ? "One" : n} statutory designated site${n !== 1 ? "s" : ""} for nature conservation ${n !== 1 ? "were" : "was"} identified during the desk study and ${n !== 1 ? "are" : "is"} summarised in Table 1 below.`);
      html += `<p><strong>Table 1: Summary of Statutory Designated Sites for Nature Conservation</strong></p>
      <table><thead><tr><th>Site Name</th><th>Size, Distance and Direction from Site</th><th>Reason for Designation</th><th>Importance</th></tr></thead><tbody>`;
      for (const row of statRows) {
        const sizeStr = row.ha ? `${row.ha} hectares<br>` : "";
        const citeLink = row.cite ? ` <a class="citation-link" href="${row.cite}" target="_blank">[NE citation ↗]</a>` : "";
        html += `<tr>
          <td>${row.name}${citeLink}</td>
          <td>${sizeStr}${locStr(row.distM, row.dir).charAt(0).toUpperCase() + locStr(row.distM, row.dir).slice(1)}</td>
          <td>${ph("Insert from NE citation")}</td>
          <td><span class="badge ${importanceClass(row.imp)}">${row.imp}</span></td>
        </tr>`;
      }
      html += `</tbody></table>`;
    }

    // Local / non-statutory
    html += `<h3>Local and Non-Statutory Designated Sites</h3>`;
    const lnrRows = statRows.filter(r => r.imp === "Local");
    if (lnrRows.length === 0) {
      html += P(`No local or non-statutory designated sites for nature conservation were identified within the ${bufLabel} search radius.`);
    } else {
      const n = lnrRows.length;
      html += P(`${n === 1 ? "One" : n} local or non-statutory designated site${n !== 1 ? "s" : ""} for nature conservation ${n !== 1 ? "were" : "was"} identified and ${n !== 1 ? "are" : "is"} summarised in Table 2 below.`);
      html += `<p><strong>Table 2: Summary of Local and Non-Statutory Designated Sites for Nature Conservation</strong></p>
      <table><thead><tr><th>Site Name</th><th>Distance and Direction from Site</th><th>Reason for Designation</th><th>Importance</th></tr></thead><tbody>`;
      for (const row of lnrRows) {
        html += `<tr>
          <td>${row.name}</td>
          <td>${locStr(row.distM, row.dir).charAt(0).toUpperCase() + locStr(row.distM, row.dir).slice(1)}</td>
          <td>${ph("Insert designation reason")}</td>
          <td><span class="badge badge-local">Local</span></td>
        </tr>`;
      }
      html += `</tbody></table>`;
    }

    html += P(`${ph("Insert Local Wildlife Sites (LWS) — open source data not available. Check with local LERC.")}`);

    // ══ HABITATS ════════════════════════════════════════════════════════════
    html += `<h2>Habitats</h2>`;
    const habitats = found.filter(r => r.cfg.type === "habitat");
    if (habitats.length === 0) {
      html += P(`No designated or priority habitats were identified within the ${bufLabel} search radius.`);
    } else {
      for (const r of habitats) {
        const habRows = [];
        for (const f of r.features) {
          const name  = f.attributes[r.cfg.nameField] || "Unclassified";
          const distM = await nearestDistanceM(f.geometry, rlbGeom);
          const dir   = directionFromRlb(rlbGeom, f.geometry);
          const ha    = formatHa(f.attributes);
          habRows.push({ name, distM, dir, ha });
        }
        habRows.sort((a, b) => (a.distM || 0) - (b.distM || 0));
        const count = habRows.length;

        if (r.cfg.groupByField) {
          const byType = {};
          habRows.forEach(f => {
            if (!byType[f.name]) byType[f.name] = { count: 0, minDist: f.distM ?? Infinity, dir: f.dir };
            byType[f.name].count++;
            if ((f.distM ?? Infinity) < byType[f.name].minDist) { byType[f.name].minDist = f.distM; byType[f.name].dir = f.dir; }
          });
          const types = Object.entries(byType).sort((a,b) => a[1].minDist - b[1].minDist);
          html += P(`${count} parcel${count !== 1 ? "s" : ""} of ${r.cfg.shortName} ${count !== 1 ? "were" : "was"} identified within the ${bufLabel} buffer, comprising the following habitat types:`);
          html += `<ul>` + types.map(([type, d]) =>
            `<li><strong>${type}</strong> — ${d.count} parcel${d.count !== 1 ? "s" : ""}, nearest ${locStr(d.minDist === Infinity ? null : d.minDist, d.dir)}</li>`
          ).join("") + `</ul>`;
        } else {
          html += P(`${count} parcel${count !== 1 ? "s" : ""} of ${r.cfg.shortName} ${count !== 1 ? "were" : "was"} identified within the ${bufLabel} buffer.`);
          if (count <= 15) {
            html += `<ul>` + habRows.map(f =>
              `<li><strong>${f.name}</strong>${f.ha ? ` (${f.ha} ha)` : ""} — ${locStr(f.distM, f.dir)}</li>`
            ).join("") + `</ul>`;
          }
        }
      }
    }

    // ══ WATERCOURSES ════════════════════════════════════════════════════════
    const rivers = found.filter(r => r.cfg.type === "river");
    if (rivers.length) {
      html += `<h2>Watercourses and River Habitats</h2>`;
      for (const r of rivers) {
        const count = r.features.length;
        html += P(`${count} feature${count !== 1 ? "s" : ""} of the ${r.cfg.shortName} layer ${count !== 1 ? "were" : "was"} identified within the ${bufLabel} buffer.`);
      }
    }

    // ══ BAT CONSULTATION ZONES ══════════════════════════════════════════════
    const bats = found.filter(r => r.cfg.type === "bat");
    if (bats.length) {
      html += `<h2>Bat Consultation Zones</h2>`;
      const zoneNames = bats.map(r => r.cfg.shortName.replace("Bat Consultation Zone — ", ""));
      html += P(`The site falls within ${bats.length > 1 ? `${bats.length} Bat Consultation Zones` : "a Bat Consultation Zone"} (${zoneNames.join("; ")}), indicating that bat survey requirements should be considered as part of any ecological assessment.`);
    }

    // ══ BIODIVERSITY RECORDS ════════════════════════════════════════════════
    const records = found.filter(r => r.cfg.type === "records");
    if (records.length) {
      html += `<h2>Biodiversity Records</h2>`;
      for (const r of records) {
        const count = r.features.length;
        const uniqueNames = [...new Set(r.features.map(f => f.attributes[r.cfg.nameField]).filter(Boolean))];
        html += P(`A total of ${count} ${r.cfg.shortName} ${count !== 1 ? "were" : "was"} retrieved within the ${bufLabel} buffer.`);
        if (uniqueNames.length) {
          const listed = uniqueNames.slice(0, r.cfg.maxList || 5);
          const rem = uniqueNames.length - listed.length;
          html += `<ul>` + listed.map(n => `<li>${n}</li>`).join("") + (rem > 0 ? `<li><em>…and ${rem} further species</em></li>` : "") + `</ul>`;
        }
      }
    }

    // ══ PLACEHOLDER SECTIONS ════════════════════════════════════════════════
    html += `<h2>Local BAP</h2>`;
    html += P(`${ph("Insert relevant Local Biodiversity Action Plan habitats and species.")}`);

    html += `<h2>Planning Policy</h2>`;
    html += P(`${ph("Insert relevant local planning policies identified from the Local Development Framework and Local Plan.")}`);

    // ══ DATA LIMITATIONS ════════════════════════════════════════════════════
    if (wms.length || missing.length) {
      html += `<h2>Data Limitations</h2>`;
      if (wms.length) html += P(`The following Welsh designation layers are served as WMS and could not be queried automatically — check visually in the map: ${wms.map(r => r.cfg.shortName).join(", ")}.`);
      if (missing.length) html += P(`The following layers could not be queried and should be verified manually: ${missing.map(r => r.cfg.shortName).join(", ")}.`);
    }

    return html;
  }

  // ── Render report ─────────────────────────────────────────────────────────
  function renderReport(html) {
    document.getElementById("reportBody").innerHTML = html;
    document.getElementById("reportBox").classList.add("visible");
    document.getElementById("reportBox").scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  // ── Copy ──────────────────────────────────────────────────────────────────
  // ── Export to Word ────────────────────────────────────────────────────────
  window.exportToWord = function() {
    const btn = document.getElementById("btnExport");
    btn.textContent = "Generating\u2026";
    btn.disabled = true;
    try {
      if (typeof htmlDocx === "undefined") throw new Error("html-docx-js not loaded");
      const reportHtml = document.getElementById("reportBody").innerHTML;
      const fullHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8">
<style>
body,p,td,th,li,h2,h3{font-family:'Century Gothic','Trebuchet MS',sans-serif;font-size:9pt;color:#111d13}
h2{font-size:9pt;font-weight:bold;margin:12pt 0 4pt;color:#1a3d2b}
h3{font-size:9pt;font-weight:bold;margin:8pt 0 4pt}
p{font-size:9pt;margin:0 0 5pt;line-height:1.4}
.para-num{font-weight:bold}
table{border-collapse:collapse;width:100%;font-size:8pt;margin:6pt 0 12pt}
th{background-color:#1a3d2b;color:#ffffff;padding:4pt 6pt;font-size:8pt;border:1pt solid #1a3d2b}
td{padding:4pt 6pt;font-size:8pt;border:1pt solid #c9dece;vertical-align:top}
tr:nth-child(even) td{background-color:#f4f9f5}
ul{margin:3pt 0 6pt 14pt}
li{font-size:9pt;margin-bottom:2pt}
.badge-intl{font-weight:bold;color:#1a3d2b}
.badge-natl{font-weight:bold;color:#1a3a6b}
.badge-local{font-weight:bold;color:#7a5200}
.placeholder{color:#8a6200;font-style:italic}
.citation-link{color:#2d6a4f;font-size:8pt}
</style></head><body>${reportHtml}</body></html>`;
      const blob = htmlDocx.asBlob(fullHtml, { orientation: "portrait", margins: { top: 720, right: 720, bottom: 720, left: 1080 } });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `Desk_Study_${new Date().toISOString().slice(0,10)}.docx`;
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = "\u2713 Downloaded";
      setTimeout(() => { btn.textContent = "\uD83D\uDCC4 Export to Word"; btn.disabled = false; }, 2500);
    } catch(e) {
      console.error("Word export failed:", e);
      btn.textContent = "Export failed \u2014 see console";
      btn.disabled = false;
    }
  };

  // ── Search ────────────────────────────────────────────────────────────────
  let searchDebounce = null;

  window.onSearchInput = function(val) {
    clearTimeout(searchDebounce);
    if (!val.trim()) { hideSearchResults(); return; }
    searchDebounce = setTimeout(() => suggestSearch(val), 300);
  };

  async function suggestSearch(query) {
    // First search RLB layer features, then geocode
    const results = [];

    // Search red line boundary layer by attribute
    try {
      const redLayers = [];
      function collectRed(layers) {
        layers.forEach(l => {
          if (CONFIG.redLineTitlePattern.test(l.title)) redLayers.push(l);
          if (l.type === "group" && l.layers) collectRed(l.layers);
        });
      }
      collectRed(webMap.layers);

      for (const layer of redLayers) {
        let url = layer.url;
        if (layer.layerId !== undefined) url += `/${layer.layerId}`;
        const q = new Query({
          where: `UPPER(LABEL) LIKE UPPER('%${query.replace(/'/g,"''")}%') OR UPPER(NAME) LIKE UPPER('%${query.replace(/'/g,"''")}%')`,
          outFields: ["*"],
          returnGeometry: true,
          num: 5,
        });
        try {
          const fs = await queryREST.executeQueryJSON(url, q);
          (fs.features || []).forEach(f => {
            const name = f.attributes["LABEL"] || f.attributes["NAME"] || f.attributes["name"] || `Feature ${f.attributes["OBJECTID"]}`;
            results.push({ label: name, type: "RLB", geometry: f.geometry });
          });
        } catch(e) {}
      }
    } catch(e) {}

    // Geocode using ArcGIS World Geocoding Service
    try {
      const encoded = encodeURIComponent(query + ", United Kingdom");
      const resp = await fetch(
        `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/suggest?text=${encoded}&maxSuggestions=5&f=json`
      );
      const data = await resp.json();
      (data.suggestions || []).forEach(s => {
        results.push({ label: s.text, type: "Place", magicKey: s.magicKey });
      });
    } catch(e) {}

    showSearchResults(results);
  }

  window.runSearch = function() {
    suggestSearch(document.getElementById("searchInput").value);
  };

  function showSearchResults(results) {
    const container = document.getElementById("searchResults");
    container.innerHTML = "";
    if (!results.length) {
      container.innerHTML = `<div class="search-result-item" style="color:var(--ink-faint)">No results found</div>`;
      container.classList.add("active");
      return;
    }
    results.forEach(r => {
      const div = document.createElement("div");
      div.className = "search-result-item";
      div.innerHTML = `${r.label} <span class="result-type">${r.type}</span>`;
      div.onclick = () => selectSearchResult(r);
      container.appendChild(div);
    });
    container.classList.add("active");
  }

  function hideSearchResults() {
    document.getElementById("searchResults").classList.remove("active");
  }

  async function selectSearchResult(result) {
    document.getElementById("searchInput").value = result.label;
    hideSearchResults();

    if (result.geometry) {
      // RLB feature — zoom directly
      view.goTo({ target: result.geometry, zoom: 15 });
    } else if (result.magicKey) {
      // Geocoded place — get full location
      try {
        const encoded = encodeURIComponent(result.label);
        const resp = await fetch(
          `https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates?SingleLine=${encoded}&magicKey=${result.magicKey}&outFields=&f=json`
        );
        const data = await resp.json();
        const loc  = data.candidates?.[0]?.location;
        if (loc) view.goTo({ target: { x: loc.x, y: loc.y, spatialReference: { wkid: 4326 } }, zoom: 14 });
      } catch(e) {}
    }
  }

  // Close search results when clicking outside
  document.addEventListener("click", e => {
    if (!document.getElementById("searchBar")?.contains(e.target)) hideSearchResults();
  });

  // ── Reset ─────────────────────────────────────────────────────────────────
  window.resetTool = function() {
    resetState(true);
  };

  function resetState(full) {
    if (clickHandler) { clickHandler.remove(); clickHandler = null; }
    if (full) {
      selectedGeom = null;
      if (bufferGraphic) { view.graphics.remove(bufferGraphic); bufferGraphic = null; }
      document.getElementById("btnSelect").classList.remove("selecting", "selected");
      document.getElementById("btnSelectLabel").textContent = "Select red line boundary";
      document.getElementById("btnRun").disabled = true;
      document.getElementById("btnRunLabel").textContent = "Run Desk Study";
      document.getElementById("layerResults").style.display = "none";
      document.getElementById("reportBox").classList.remove("visible");
      document.getElementById("btnReset").style.display = "none";
      hideProgress();
      clearStatus();
    }
    view.cursor = "default";
    document.getElementById("selectOverlay").classList.remove("active");
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function setStatus(type, msg) {
    const el = document.getElementById("statusBar");
    el.className = `status-bar ${type}`;
    el.textContent = msg;
  }
  function clearStatus() {
    const el = document.getElementById("statusBar");
    el.className = "status-bar";
    el.textContent = "";
  }
  function showProgress(pct, label) {
    document.getElementById("progressWrap").classList.add("active");
    document.getElementById("progressBar").style.width = pct + "%";
    document.getElementById("progressLabel").textContent = label;
  }
  function hideProgress() {
    document.getElementById("progressWrap").classList.remove("active");
  }
  function resetRunButton() {
    document.getElementById("btnRun").disabled = false;
    document.getElementById("btnRunLabel").textContent = "Run Desk Study";
  }

}); // end require
</script>
</body>
</html>
